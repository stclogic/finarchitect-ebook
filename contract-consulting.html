<!DOCTYPE html>
<!-- 컨설팅 서비스 계약서 생성기 — EN/KO/JA 3국어, 티어 선택·PDF·Trust-Lock -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulting Agreement — STCLOGIC</title>
<link rel="stylesheet" href="assets/css/site.css">
<style>
.cg-wrap { display: grid; grid-template-columns: 390px 1fr; gap: 0; min-height: 100vh; }
.cg-panel { background: var(--white); border-right: 1px solid var(--border); padding: 1.5rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.cg-preview { background: var(--cream); padding: 2rem; overflow-y: auto; }

/* Lang switcher */
.cg-lang { display: flex; gap: 4px; margin-bottom: 1.25rem; }
.cg-lang button { padding: 5px 13px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; transition: all .15s; }
.cg-lang button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.cg-panel-title { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; padding-bottom: 0.9rem; border-bottom: 1px solid var(--border); }
.cg-section { margin-bottom: 1.25rem; }
.cg-label { font-size: 0.73rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 0.4rem; display: block; }
.cg-input { width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; color: var(--text); background: var(--cream); transition: border .15s; box-sizing: border-box; }
.cg-input:focus { outline: none; border-color: var(--primary); background: var(--white); }
.cg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }

/* Tier */
.tier-grid { display: flex; flex-direction: column; gap: 0.45rem; }
.tier-card { border: 2px solid var(--border); border-radius: 10px; padding: 0.8rem 0.9rem; cursor: pointer; transition: all .15s; display: flex; align-items: flex-start; gap: 0.7rem; }
.tier-card:hover, .tier-card.active { border-color: var(--primary); background: var(--primary-light); }
.tier-radio { width: 17px; height: 17px; border: 2px solid var(--border); border-radius: 50%; margin-top: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.tier-card.active .tier-radio { border-color: var(--primary); background: var(--primary); }
.tier-card.active .tier-radio::after { content:''; width:6px; height:6px; border-radius:50%; background:#fff; display:block; }
.tier-name { font-weight: 700; font-size: 0.88rem; color: var(--text); }
.tier-range { font-size: 0.75rem; color: var(--text2); margin-top: 1px; }
.tier-badge { font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; margin-left: auto; flex-shrink: 0; }
.badge-std { background:#E0F2FE; color:#0369A1; }
.badge-pro { background:#EDE9FE; color:#5B21B6; }
.badge-ent { background:#FEF3C7; color:#92400E; }

/* Checkboxes */
.cb-grid { display: flex; flex-direction: column; gap: 0.35rem; }
.cb-item { display: flex; align-items: center; gap: 0.55rem; cursor: pointer; font-size: 0.83rem; color: var(--text); }
.cb-item input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--primary); }

/* Jurisdiction */
.juri-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.45rem; }
.juri-card { border: 2px solid var(--border); border-radius: 8px; padding: 0.65rem; cursor: pointer; text-align: center; transition: all .15s; }
.juri-card:hover, .juri-card.active { border-color: var(--primary); background: var(--primary-light); }
.juri-flag { font-size: 1.3rem; }
.juri-name { font-size: 0.78rem; font-weight: 700; color: var(--text); margin-top: 2px; }
.juri-body { font-size: 0.68rem; color: var(--text2); }

/* Completion */
.completion-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 0.5rem; overflow: hidden; }
.completion-fill { height: 100%; background: linear-gradient(90deg,var(--primary),#EC4899); border-radius: 2px; transition: width .4s; }
.completion-text { font-size: 0.73rem; color: var(--text2); margin-bottom: 1rem; text-align: right; }

/* Actions */
.cg-actions { display: flex; flex-direction: column; gap: 0.45rem; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
.btn-pdf { padding: 10px; background: var(--primary); color: #fff; border: none; border-radius: 999px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: background .2s; }
.btn-pdf:hover { background: var(--primary-dark); }
.btn-trust { padding: 10px; background: linear-gradient(90deg,#0EA5E9,#6366F1); color: #fff; border: none; border-radius: 999px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: opacity .2s; }
.btn-trust:hover { opacity: .88; }
.btn-print { padding: 10px; background: none; color: var(--text2); border: 1px solid var(--border); border-radius: 999px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all .2s; }
.btn-print:hover { border-color: var(--primary); color: var(--primary); }
.tl-badge { display:none; background:linear-gradient(90deg,#0EA5E9,#6366F1); color:#fff; border-radius:8px; padding:0.65rem 0.9rem; font-size:0.75rem; margin-top:0.4rem; line-height:1.6; }
.tl-badge.show { display:block; }

/* Contract doc */
.contract-doc { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 3.5rem; max-width: 760px; margin: 0 auto; box-shadow: var(--shadow); font-family: 'Times New Roman', Georgia, 'Apple SD Gothic Neo', serif; font-size: 0.9rem; line-height: 1.85; color: #1a1a2e; }
.contract-doc h1 { font-size: 1.25rem; font-weight: 700; text-align: center; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 0.2rem; }
.contract-doc .doc-subtitle { text-align:center; font-size:0.83rem; color:#666; margin-bottom:1.75rem; }
.contract-doc .doc-ref { font-size:0.78rem; color:#999; text-align:right; margin-bottom:1.75rem; }
.ornament { text-align:center; color:#b0a070; font-size:1rem; margin:1.4rem 0; letter-spacing:.12em; }
.parties-box { border:1px solid #d4c89a; border-radius:6px; padding:1.1rem 1.4rem; background:#FAFAF5; margin-bottom:1.4rem; }
.parties-box .party { margin-bottom:0.7rem; }
.parties-box .party:last-child { margin-bottom:0; }
.p-role { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#999; }
.p-name { font-weight:700; font-size:0.97rem; color:#1a1a2e; }
.p-detail { font-size:0.8rem; color:#666; }
.clause { margin-bottom:1.4rem; }
.clause-title { font-weight:700; font-size:0.86rem; text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid #e0d8c0; padding-bottom:4px; margin-bottom:0.7rem; }
.clause p { margin-bottom:0.45rem; }
.clause ol { padding-left:1.4rem; }
.clause ol li { margin-bottom:0.35rem; }
.tier-highlight { background:#FFF8E7; border:1px solid #F59E0B; border-radius:6px; padding:0.9rem 1.1rem; margin:0.7rem 0; }
.th-label { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#B45309; margin-bottom:0.35rem; }
.juri-highlight { background:#EFF6FF; border:1px solid #3B82F6; border-radius:6px; padding:0.9rem 1.1rem; margin:0.7rem 0; }
.sig-grid { display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin-top:2.5rem; }
.sig-box { border-top:1px solid #1a1a2e; padding-top:0.7rem; }
.sig-role { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#999; }
.sig-name { font-size:0.88rem; font-weight:700; margin-top:0.2rem; }
.sig-line { height:38px; border-bottom:1px solid #aaa; margin:0.7rem 0 0.2rem; }
.sig-date { font-size:0.78rem; color:#999; }
.tl-seal { border:1px solid #0EA5E9; border-radius:8px; padding:0.7rem 0.9rem; margin-top:1.4rem; font-size:0.73rem; color:#0369A1; background:#F0F9FF; display:none; }
.tl-seal.show { display:block; }

@media print {
  .cg-panel, .site-nav, header, footer { display:none !important; }
  .cg-wrap { display:block; }
  .cg-preview { padding:0; background:#fff; }
  .contract-doc { border:none; box-shadow:none; border-radius:0; padding:1.5cm 2cm; max-width:100%; font-size:10pt; line-height:1.7; }
  .contract-doc h1 { font-size:13pt; }
  .clause-title { font-size:9.5pt; }
  .sig-grid { margin-top:3cm; page-break-inside:avoid; }
  @page { size:A4; margin:0; }
}
@media (max-width:900px) {
  .cg-wrap { grid-template-columns:1fr; }
  .cg-panel { position:static; height:auto; }
}
</style>
</head>
<body>
<script src="assets/js/nav-inject.js"></script>
<div class="cg-wrap">

<!-- ══ LEFT PANEL ══ -->
<div class="cg-panel">

  <!-- Language switcher -->
  <div class="cg-lang">
    <button onclick="setLang('en')" id="lb-en" class="active">EN</button>
    <button onclick="setLang('ko')" id="lb-ko">KO</button>
    <button onclick="setLang('ja')" id="lb-ja">JA</button>
  </div>

  <div class="cg-panel-title" id="ui-title">⚖️ Contract Generator</div>

  <div class="completion-bar"><div class="completion-fill" id="compFill" style="width:0%"></div></div>
  <div class="completion-text" id="compText"></div>

  <!-- Provider -->
  <div class="cg-section">
    <span class="cg-label" id="ui-provLabel"></span>
    <input class="cg-input" id="provName" value="STCLOGIC Co., Ltd." oninput="render()">
    <div style="height:.4rem"></div>
    <input class="cg-input" id="provAddr" value="Seoul, Republic of Korea" oninput="render()">
  </div>

  <!-- Client -->
  <div class="cg-section">
    <span class="cg-label" id="ui-cliLabel"></span>
    <input class="cg-input" id="cliName" oninput="render()">
    <div style="height:.4rem"></div>
    <input class="cg-input" id="cliAddr" oninput="render()">
    <div style="height:.4rem"></div>
    <div class="cg-row">
      <input class="cg-input" id="cliEmail" oninput="render()">
      <input class="cg-input" id="cliReg" oninput="render()">
    </div>
  </div>

  <!-- Date -->
  <div class="cg-section">
    <span class="cg-label" id="ui-dateLabel"></span>
    <input class="cg-input" id="contDate" type="date" oninput="render()">
  </div>

  <!-- Tier -->
  <div class="cg-section">
    <span class="cg-label" id="ui-tierLabel"></span>
    <div class="tier-grid">
      <div class="tier-card" id="t-std" onclick="setTier('std')">
        <div class="tier-radio" id="tr-std"></div>
        <div><div class="tier-name">Standard</div><div class="tier-range">$9,999 – $49,999</div></div>
        <span class="tier-badge badge-std">STD</span>
      </div>
      <div class="tier-card" id="t-pro" onclick="setTier('pro')">
        <div class="tier-radio" id="tr-pro"></div>
        <div><div class="tier-name">Professional</div><div class="tier-range">$50,000 – $199,999</div></div>
        <span class="tier-badge badge-pro">PRO</span>
      </div>
      <div class="tier-card" id="t-ent" onclick="setTier('ent')">
        <div class="tier-radio" id="tr-ent"></div>
        <div><div class="tier-name">Enterprise</div><div class="tier-range">$200,000 +</div></div>
        <span class="tier-badge badge-ent">ENT</span>
      </div>
    </div>
  </div>

  <!-- Fee -->
  <div class="cg-section">
    <span class="cg-label" id="ui-feeLabel"></span>
    <input class="cg-input" id="feeAmt" oninput="render()">
  </div>

  <!-- Services -->
  <div class="cg-section">
    <span class="cg-label" id="ui-svcLabel"></span>
    <div class="cb-grid" id="svc-checks"></div>
  </div>

  <!-- Jurisdiction -->
  <div class="cg-section">
    <span class="cg-label" id="ui-juriLabel"></span>
    <div class="juri-grid">
      <div class="juri-card" id="j-sg" onclick="setJuri('sg')">
        <div class="juri-flag">🇸🇬</div>
        <div class="juri-name">Singapore</div>
        <div class="juri-body">SIAC Rules</div>
      </div>
      <div class="juri-card" id="j-ae" onclick="setJuri('ae')">
        <div class="juri-flag">🇦🇪</div>
        <div class="juri-name">Dubai</div>
        <div class="juri-body">DIAC / DIFC-LCIA</div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="cg-actions">
    <button class="btn-pdf" id="ui-btnPdf" onclick="window.print()"></button>
    <button class="btn-trust" id="ui-btnTrust" onclick="uploadTrustLock()"></button>
    <div class="tl-badge" id="tlBadge"></div>
  </div>
</div>

<!-- ══ RIGHT PREVIEW ══ -->
<div class="cg-preview">
  <div class="contract-doc" id="contractDoc">
    <p style="text-align:center;color:#bbb;padding:3rem 0;" id="emptyMsg"></p>
  </div>
</div>
</div>

<script>
// ══════════════════════════════════════════
//  i18n DATA
// ══════════════════════════════════════════
var I18N = {
en: {
  uiTitle: '⚖️ Contract Generator',
  provLabel: 'Service Provider',
  cliLabel: 'Client Information',
  cliNamePh: 'Client Full Name / Company Name',
  cliAddrPh: 'Address / Country',
  cliEmailPh: 'Email',
  cliRegPh: 'Reg. No. (optional)',
  dateLabel: 'Contract Date',
  tierLabel: 'Service Tier',
  feeLabel: 'Agreed Fee Amount (USD)',
  feePh: 'e.g. 75,000',
  svcLabel: 'Scope of Services',
  juriLabel: 'Arbitration Jurisdiction',
  btnPdf: '📄 Save PDF / Print',
  btnTrust: '🔐 Preserve on Trust-Lock',
  compDone: '100% — Contract ready',
  compMore: '% — Please fill in more details',
  compAlmost: '% — Almost complete',
  emptyMsg: '← Fill in the panel to generate the contract.',
  tlDone: '✅ Trust-Lock Preserved',
  tlRef: 'Ref: ',
  tlTime: 'Preserved: ',
  tlAlert: (h,t) => `✅ Trust-Lock Preservation Complete!\n\nReference: ${h}\nTimestamp: ${t}\n\nPlease record this number on the signed contract.`,
  tlMissing: 'Please enter client name, select a tier, and choose a jurisdiction before preserving.',
  services: [

    {v:'spv', label:'SPV / SPC Structuring'},
    {v:'sto', label:'STO / RWA Tokenization'},

    {v:'exit', label:'Exit Strategy'},

  ],
  tiers: {
    std: { label:'Standard', retainer:'30%', support:'Email support (72h response)', deliverables:'Basic Structure Design · IR Document Set · 1× Legal Review · 3-Month Email Support', duration:'3 months' },
    pro: { label:'Professional', retainer:'30%', support:'Priority support (24h response)', deliverables:'Full Capital Structure · SPV/SPC Blueprint · STO Advisory · 2× Legal Review · Due Diligence Support · 6-Month Priority Support', duration:'6 months' },
    ent: { label:'Enterprise', retainer:'20%', support:'Dedicated Manager (same-day)', deliverables:'End-to-End Capital Architecture · SPV/SPC/STO Full Execution · HNWI Asset Design · Exit Strategy · Bank Instrument Advisory · NCND Framework · 12-Month Dedicated Management', duration:'12 months' }
  },
  juris: {
    sg: { name:'Singapore', body:'Singapore International Arbitration Centre (SIAC)', rules:'SIAC Arbitration Rules (latest edition)', seat:'Singapore', law:'Singapore law' },
    ae: { name:'Dubai (DIFC)', body:'Dubai International Arbitration Centre (DIAC) / DIFC-LCIA', rules:'DIAC Arbitration Rules / DIFC-LCIA Arbitration Rules (latest edition)', seat:'Dubai, United Arab Emirates', law:'UAE Federal Law (DIFC jurisdiction)' }
  },
  doc: {
    title: 'CONSULTING SERVICES AGREEMENT',
    subtitle: 'Confidential · For Execution Only',
    cnoPrefix: 'Contract No.: ',
    provRole: 'Service Provider ("The Advisor")',
    cliRole: 'Client ("The Principal")',
    intro: (prov, cli, date) => `This Consulting Services Agreement (hereinafter "<strong>the Agreement</strong>") is entered into as of <strong>${date}</strong> between <strong>${prov}</strong> (the "<strong>Advisor</strong>") and <strong>${cli}</strong> (the "<strong>Principal</strong>"), collectively referred to as "the <strong>Parties</strong>".`,
    tierBoxLabel: (t) => `Selected Service Tier: ${t.toUpperCase()}`,
    feeRange: 'Fee Range:',
    retainerLabel: 'Retainer (Advance):',
    retainerSuffix: 'of total agreed fee, due upon execution',
    durationLabel: 'Engagement Duration:',
    durationSuffix: 'from the Effective Date',
    supportLabel: 'Support Level:',
    deliverablesLabel: 'Standard Deliverables:',
    juriBodyLabel: 'Arbitral Body:',
    juriRulesLabel: 'Rules:',
    juriSeatLabel: 'Seat of Arbitration:',
    juriLawLabel: 'Governing Law:',
    sigAdvisorRole: 'For and on behalf of the Advisor',
    sigPrincipalRole: 'For and on behalf of the Principal',
    sigAuth: 'Authorised Signatory',
    sigDate: 'Date:',
    witnessClause: 'IN WITNESS WHEREOF, the Parties have executed this Consulting Services Agreement as of the date first written above.',
    tlSealPrefix: '🔐 This Agreement has been preserved on the Trust-Lock Blockchain Platform.',
    tlSealRef: 'Reference:',
    tlSealTime: 'Timestamp:',
    noTier: '[SERVICE TIER NOT SELECTED]',
    noJuri: '[JURISDICTION NOT SELECTED]',
    noServices: '<li>— To be specified by mutual agreement —</li>',
    clauses: [
      { num:'1', title:'DEFINITIONS AND INTERPRETATION', body: (d) => `
        <p><strong>"Agreement"</strong> means this Consulting Services Agreement including all schedules and annexures hereto.</p>
        <p><strong>"Engagement Period"</strong> means the period commencing on the Effective Date and continuing for the duration specified under the selected Service Tier.</p>
        <p><strong>"Confidential Information"</strong> means any non-public information disclosed by either Party in connection with this Agreement, including financial data, project details, strategies, and proprietary methodologies.</p>
        <p><strong>"Deliverables"</strong> means all reports, documents, models, frameworks, and advisory outputs produced by the Advisor pursuant to this Agreement.</p>
        <p><strong>"Event of Default"</strong> means any event listed in Clause 13.</p>
        <p><strong>"Retainer"</strong> means the advance fee payable by the Principal upon execution as a precondition to commencement of services.</p>
        <p><strong>"Trust-Lock"</strong> means the blockchain-based document preservation platform operated by STCLOGIC at fincoupling.netlify.app, onto which this Agreement is registered as an immutable record.</p>
        <p><strong>"Business Day"</strong> means a day (other than Saturday, Sunday, or public holiday) on which banks are open in Singapore or Dubai, as applicable.</p>
        <p>All currency references are to United States Dollars (USD) unless otherwise specified.</p>` },
      { num:'2', title:'ENGAGEMENT AND SCOPE OF SERVICES', body: (d) => `
        <p>The Advisor agrees to provide the Principal with professional financial consulting and advisory services on the terms and conditions set forth herein. The agreed scope of services includes:</p>
        <ol>${d.serviceList}</ol>
        <p>The Parties may, by mutual written agreement, expand or modify the scope of services during the Engagement Period via a signed written addendum.</p>` },
      { num:'3', title:'SERVICE TIER, DELIVERABLES AND DURATION', body: (d) => `
        <p>The Principal has selected the following Service Tier, which governs the fee structure, deliverables, and support level applicable to this engagement:</p>
        ${d.tierBlock}
        <p>The Advisor shall use commercially reasonable efforts to deliver all Deliverables within the Engagement Period, subject to the Principal's timely provision of required information per Clause 7.</p>` },
      { num:'4', title:'FEES AND PAYMENT TERMS', body: (d) => `
        <p>In consideration of the services provided hereunder, the Principal agrees to pay a total Consulting Fee of <strong>${d.fee}</strong>, payable as follows:</p>
        <ol>
          <li><strong>Retainer:</strong> ${d.retainer} of the total Consulting Fee is due upon execution. No work commences until the Retainer is received and cleared.</li>
          <li><strong>Milestone Payments:</strong> The remaining balance is payable per a milestone schedule agreed in writing within five (5) Business Days of execution.</li>
          <li><strong>Final Payment:</strong> Any outstanding balance is due upon delivery of final Deliverables or expiry of the Engagement Period, whichever is earlier.</li>
        </ol>
        <p>All payments shall be made by wire transfer (SWIFT/TT) free and clear of all taxes, deductions, and withholdings. The Principal bears all transfer and conversion charges.</p>` },
      { num:'5', title:'LATE PAYMENT AND INTEREST', body: () => `
        <p>5.1 Overdue amounts shall accrue interest at <strong>1.5% per month</strong> from the due date until actual payment.</p>

        <p>5.3 The Advisor may require prepayment of outstanding amounts before resuming suspended services.</p>` },
      { num:'6', title:'TERMINATION AND REFUND POLICY', body: () => `
        <p>6.1 Either Party may terminate upon thirty (30) days' written notice.</p>
        <p>6.2 The Retainer is non-refundable once services have commenced.</p>
        <p>6.3 Upon termination by the Principal after commencement, the Principal shall pay all fees on a pro-rata basis for services rendered, plus all reasonable costs incurred by the Advisor.</p>
        <p>6.4 Upon termination due to the Principal's material breach, all outstanding fees become immediately due and payable.</p>
        <p>6.5 The Advisor may terminate immediately if the Principal engages in activities violating applicable law or the terms hereof.</p>` },
      { num:'7', title:'CONDITIONS PRECEDENT', body: () => `
        <p>The Advisor's obligation to commence services is subject to prior satisfaction of all of the following:</p>
        <ol type="a">
          <li>Receipt of the duly executed original (or electronic equivalent) of this Agreement by both Parties;</li>
          <li>Receipt and clearance of the Retainer in full;</li>
          <li>Submission of required KYC/KYB documentation: (a) certified government-issued photo ID; (b) proof of address within 90 days; (c) corporate registration documents (if applicable); (d) declaration of source of funds;</li>
          <li>Completion of the Advisor's internal AML/CFT compliance check with a satisfactory result; and</li>
          <li>Registration of this Agreement on the Trust-Lock blockchain preservation platform.</li>
        </ol>` },
      { num:'8', title:'REPRESENTATIONS AND WARRANTIES', body: () => `
        <p>8.1 <strong>The Principal</strong> represents and warrants that: (a) it has full legal authority to enter into this Agreement; (b) this Agreement is its legal, valid, and binding obligation; (c) it is not subject to any sanctions or legal proceedings preventing performance; (d) all funds are from legitimate and lawful sources; and (e) no services or Deliverables will be used for any unlawful purpose including money laundering, terrorism financing, or fraud.</p>
        <p>8.2 <strong>The Advisor</strong> represents and warrants that: (a) it possesses the expertise necessary to perform the services; (b) all services will be performed with reasonable skill and care; and (c) performance of this Agreement will not violate any applicable law.</p>
        <p>8.3 <strong>Legal Source of Funds:</strong> Both Parties warrant that no funds exchanged hereunder are connected to any terrorist activity, money laundering, or criminal enterprise. The Advisor reserves the right to conduct ongoing due diligence throughout the Engagement Period.</p>` },
      { num:'9', title:'CONFIDENTIALITY AND NON-DISCLOSURE', body: () => `
        <p>9.1 Each Party shall hold the other's Confidential Information in strict confidence and not disclose it to any third party without prior written consent, except as required by law.</p>
        <p>9.2 Confidential Information shall be used solely for the purposes of this Agreement and protected with at least the same degree of care as each Party uses for its own confidential information.</p>

        </ol>` },
      { num:'제8조', title:'진술 및 보장', body: () => `
        <p>8.1 <strong>의뢰사</strong>는 다음 사항을 진술하고 보장한다. (가) 본 계약을 체결할 완전한 법적 권한을 보유하고 있다; (나) 본 계약은 적법하고 유효한 구속력 있는 의무이다; (다) 이행을 방해하는 제재 또는 법적 절차에 처해 있지 않다; (라) 본 계약과 관련된 모든 자금은 합법적인 출처에서 유래한다; (마) 어떠한 서비스나 산출물도 자금세탁, 테러 자금 조달, 사기 등 위법 목적에 사용되지 아니한다.</p>
        <p>8.2 <strong>자문사</strong>는 다음 사항을 진술하고 보장한다. (가) 서비스 수행에 필요한 전문성과 역량을 보유하고 있다; (나) 모든 서비스는 합리적인 기술과 주의를 기울여 수행된다; (다) 본 계약의 이행이 관련 법령을 위반하지 아니한다.</p>
        <p>8.3 <strong>자금의 합법적 출처:</strong> 양 당사자는 본 계약에서 교환되는 어떠한 자금도 테러, 자금세탁 또는 범죄 행위와 무관함을 보장한다. 자문사는 계약 기간 전반에 걸쳐 지속적인 실사를 시행할 권리를 보유한다.</p>` },
      { num:'제9조', title:'기밀 유지 및 비공개 의무', body: () => `
        <p>9.1 각 당사자는 타방의 기밀 정보를 엄격히 기밀로 유지하며, 법령에 의해 요구되는 경우를 제외하고 사전 서면 동의 없이 제3자에게 공개하지 아니한다.</p>
        <p>9.2 기밀 정보는 본 계약의 목적 범위 내에서만 활용하며, 자신의 기밀 정보에 적용하는 것과 동등한 수준 이상의 주의로 보호한다.</p>
        <p>9.3 본 기밀 유지 의무는 계약 종료 후 <strong>5년간</strong> 존속한다.</p>
        <p>9.4 자문사는 의뢰사의 사전 서면 동의 없이 의뢰사의 신원 또는 계약 내용을 제3자에게 공개하지 아니한다.</p>` },
      { num:'제10조', title:'비우회 및 비공개 (NCND)', body: () => `
        <p>10.1 의뢰사는 자문사가 소개한 인물, 법인 또는 기관에 대해 자문사를 통하거나 자문사의 사전 서면 동의 없이는 직·간접적으로 접촉, 협상, 참여 또는 거래하지 아니할 것을 취소 불가능하게 약정한다.</p>
        <p>10.2 본 의무는 의뢰사의 이사, 임원, 직원, 계열사 및 의뢰사를 대신하여 행동하는 모든 자에게 적용된다.</p>
        <p>10.3 비우회 행위가 발생하는 경우, 의뢰사는 자문사에게 지급되었어야 할 모든 보수에 더하여 그 <strong>2배</strong>에 해당하는 위약금을 배상하여야 한다.</p>
        <p>10.4 본 조항은 계약 종료 후 관련 당사자 소개일로부터 <strong>2년간</strong> 효력을 유지한다.</p>` },
      { num:'제11조', title:'지식재산권', body: () => `
        <p>11.1 의뢰사를 위해 특별히 작성된 산출물에 대한 지식재산권은 모든 보수가 최종 완납된 시점에 의뢰사에게 귀속된다.</p>
        <p>11.2 자문사는 자사의 독점 방법론, 프레임워크, 템플릿, 도구 및 노하우에 대한 일체의 지식재산권을 보유하며, 의뢰사에게 본 계약의 목적 범위 내에서만 사용할 수 있는 제한적이고 비독점적인 사용권을 부여한다.</p>` },
      { num:'제12조', title:'책임의 제한', body: () => `
        <p>12.1 자문사의 총 누적 책임은 의뢰사가 본 계약에 따라 실제로 지급한 총 컨설팅 보수를 초과하지 아니한다.</p>
        <p>12.2 어느 당사자도 이익 손실, 수익 손실을 포함한 간접적, 결과적, 우발적, 특별 또는 징벌적 손해에 대해 책임을 지지 아니한다.</p>
        <p>12.3 본 계약에 따른 자문 서비스는 법률, 세무 또는 투자 자문을 구성하지 아니한다. 의뢰사는 산출물에 의존하여 내린 모든 결정에 단독으로 책임을 진다.</p>` },
      { num:'제13조', title:'채무불이행 사유', body: () => `
        <p>다음 각 호의 사유는 채무불이행 사유에 해당한다.</p>
        <ol type="가">
          <li>의뢰사가 지급 기일로부터 10 영업일 이내에 지급을 이행하지 아니한 경우;</li>
          <li>의뢰사가 중대한 계약 조건을 위반하고 서면 통지 후 15 영업일 이내에 시정하지 아니한 경우;</li>
          <li>의뢰사의 진술 또는 보장이 중대하게 허위이거나 오해의 소지가 있는 것으로 판명된 경우;</li>
          <li>의뢰사가 지급불능 상태가 되거나 사업을 중단한 경우;</li>
          <li>의뢰사가 제10조를 위반하여 비우회 행위를 한 경우;</li>
          <li>의뢰사가 산출물을 위법한 목적에 사용한 경우.</li>
        </ol>
        <p>채무불이행 사유 발생 시, 자문사는 (i) 즉시 서비스를 중단하고, (ii) 모든 미지급 보수를 즉시 청구하며, (iii) 서면 통지로 계약을 해지할 수 있다.</p>` },
      { num:'제14조', title:'확약', body: () => `
        <p>의뢰사는 계약 기간 전반에 걸쳐 다음 사항을 확약한다.</p>
        <ol type="가">
          <li>자문사가 합리적으로 요청하는 모든 정보, 문서 및 접근을 신속하게 제공한다;</li>
          <li>재무 상태, 법적 지위 또는 채무불이행 사유에 중대한 변화가 발생할 경우 자문사에게 즉시 통지한다;</li>
          <li>본 계약과 관련된 모든 필요한 동의, 인허가 및 승인을 취득하고 유지한다;</li>
          <li>계약 기간 중 자문사의 사전 서면 동의 없이 실질적으로 유사한 서비스를 제공하는 경쟁 자문사를 선임하지 아니한다;</li>
          <li>자문사가 실시하는 모든 KYC/AML/CFT 검토에 성실히 협조한다.</li>
        </ol>` },
      { num:'제15조', title:'불가항력', body: () => `
        <p>15.1 어느 당사자도 천재지변, 자연재해, 감염병, 전쟁, 테러, 정부 조치 또는 금융 인프라의 체계적 장애 등 합리적인 통제를 벗어난 사정으로 인한 의무 불이행에 대하여 책임을 지지 아니한다.</p>
        <p>15.2 영향을 받은 당사자는 가능한 한 신속하게 상대방에게 서면으로 통지하고, 그 영향을 완화하기 위해 모든 합리적인 노력을 기울여야 한다.</p>
        <p>15.3 불가항력 사유가 연속 60일 이상 지속되는 경우, 어느 당사자든 서면 통지로 계약을 해지할 수 있으며, 이 경우 기 제공된 서비스에 대한 보수는 일할 계산하여 지급한다.</p>` },
      { num:'제16조', title:'통지 및 일반 조항', body: () => `
        <p>16.1 모든 통지는 수신 확인 첨부 이메일, 택배 또는 등기우편으로 서면 전달하며, 수령 확인 시 도달한 것으로 간주한다.</p>
        <p>16.2 본 계약은 당사자 간 해당 사항에 관한 전체 합의를 구성하며, 이전의 모든 합의 및 양해를 대체한다.</p>
        <p>16.3 어느 조항이 무효 또는 집행 불가능한 것으로 판정되더라도, 나머지 조항은 완전한 효력을 유지한다.</p>
        <p>16.4 의뢰사는 자문사의 사전 서면 동의 없이 본 계약상의 권리 또는 의무를 양도할 수 없다.</p>
        <p>16.5 본 계약서는 영어로 작성된다. 한국어 또는 일본어 번역본이 준비된 경우 이는 참고용이며, 내용이 상충될 경우 영어 원문이 우선한다.</p>` },
      { num:'제17조', title:'Trust-Lock 블록체인 보존', body: () => `
        <p>17.1 계약 체결 즉시, 본 계약서는 <strong>fincoupling.netlify.app/#/trust-lock</strong>의 Trust-Lock 플랫폼에 제출되어 보존된다.</p>
        <p>17.2 서명된 계약서의 암호화 해시(SHA-256)가 Trust-Lock 원장에 기록되어 계약 내용의 불변하는 타임스탬프 증거가 생성된다.</p>
        <p>17.3 Trust-Lock 참조번호는 이후 모든 법적·규제적 절차에서 본 계약에 대한 유효한 참조로 사용된다.</p>
        <p>17.4 Trust-Lock 기록에 대한 접근은 양 당사자 및 정당하게 수권된 법률 대리인으로 제한된다.</p>` },
      { num:'제18조', title:'준거법 및 국제 중재', body: (d) => `
        <p>18.1 본 계약은 아래에 명시된 중재 장소의 법률에 의해 규율되고 해석된다.</p>
        ${d.juriBlock}
        <p>18.2 본 계약과 관련하여 발생하는 모든 분쟁, 이견 또는 청구는 위에 명시된 기관의 규칙에 따른 구속력 있는 중재에 의해 최종 해결된다. 중재는 단독 중재인 1명에 의해 영어로 진행된다.</p>
        <p>18.3 중재 판정은 최종적이며 구속력이 있고, 관할 법원에서 집행될 수 있다. 양 당사자는 법원에 대한 불복 신청권을 명시적으로 포기한다.</p>
        <p>18.4 본 조항은 회복 불가능한 손해를 방지하기 위해 필요한 경우 법원에 긴급 임시 또는 금지 명령을 신청하는 것을 방해하지 아니한다.</p>
        <p>18.5 양 당사자는 선택된 중재 장소가 본 계약에서 예정된 프로젝트와 관련하여 싱가포르 및/또는 두바이에서의 SPC·SPV 설립을 반영함을 확인한다.</p>` }
    ]
  }
},

// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
var lang = 'en';
var tier = '';
var juri = '';

function setLang(l) {
  lang = l;
  ['en','ko','ja'].forEach(function(x){ document.getElementById('lb-'+x).classList.toggle('active', x===l); });
  document.documentElement.lang = l==='ko'?'ko':l==='ja'?'ja':'en';
  applyUI();
  render();
}

function setTier(t) {
  tier = t;
  ['std','pro','ent'].forEach(function(x){
    document.getElementById('t-'+x).classList.toggle('active', x===t);
  });
  render();
}

function setJuri(j) {
  juri = j;
  ['sg','ae'].forEach(function(x){ document.getElementById('j-'+x).classList.toggle('active', x===j); });
  render();
}

function v(id){ return document.getElementById(id).value.trim(); }

function applyUI() {
  var t = I18N[lang];
  document.getElementById('ui-title').textContent = t.uiTitle;
  document.getElementById('ui-provLabel').textContent = t.provLabel;
  document.getElementById('ui-cliLabel').textContent = t.cliLabel;
  document.getElementById('cliName').placeholder = t.cliNamePh;
  document.getElementById('cliAddr').placeholder = t.cliAddrPh;
  document.getElementById('cliEmail').placeholder = t.cliEmailPh;
  document.getElementById('cliReg').placeholder = t.cliRegPh;
  document.getElementById('ui-dateLabel').textContent = t.dateLabel;
  document.getElementById('ui-tierLabel').textContent = t.tierLabel;
  document.getElementById('ui-feeLabel').textContent = t.feeLabel;
  document.getElementById('feeAmt').placeholder = t.feePh;
  document.getElementById('ui-svcLabel').textContent = t.svcLabel;
  document.getElementById('ui-juriLabel').textContent = t.juriLabel;
  document.getElementById('ui-btnPdf').textContent = t.btnPdf;
  document.getElementById('ui-btnTrust').textContent = t.btnTrust;
  var emptyEl = document.getElementById('emptyMsg');
  if(emptyEl) emptyEl.textContent = t.emptyMsg;
  // rebuild services
  var cb = document.getElementById('svc-checks');
  var prev = {};
  cb.querySelectorAll('input').forEach(function(el){ prev[el.value] = el.checked; });
  cb.innerHTML = '';
  t.services.forEach(function(s){
    var lbl = document.createElement('label');
    lbl.className = 'cb-item';
    lbl.innerHTML = '<input type="checkbox" value="'+s.v+'" onchange="render()"> '+s.label;
    if(prev[s.v]) lbl.querySelector('input').checked = true;
    cb.appendChild(lbl);
  });
}

function getServices() {
  var items = [];
  document.querySelectorAll('#svc-checks input:checked').forEach(function(cb){
    var t2 = I18N[lang].services.find(function(s){ return s.v===cb.value; });
    if(t2) items.push(t2.label);
  });
  return items;
}

function contractNum() {
  var d = v('contDate') || new Date().toISOString().slice(0,10);
  var n = v('cliName') ? v('cliName').replace(/\s+/g,'').toUpperCase().slice(0,4) : 'XXXX';
  return 'STC-'+d.replace(/-/g,'')+'-'+n;
}

function updateCompletion() {
  var t = I18N[lang];
  var s = 0;
  if(v('cliName')) s+=20;
  if(v('cliAddr')) s+=10;
  if(v('contDate')) s+=10;
  if(tier) s+=25;
  if(juri) s+=20;
  if(getServices().length>0) s+=15;
  document.getElementById('compFill').style.width = s+'%';
  var msg = s===100 ? t.compDone : s>=60 ? s+t.compAlmost : s+t.compMore;
  document.getElementById('compText').textContent = msg;
}

function render() {
  updateCompletion();
  var t = I18N[lang];
  var d = t.doc;
  var cli = v('cliName') || (lang==='ko'?'_______________':lang==='ja'?'＿＿＿＿＿':'_______________');
  var cliAddr = v('cliAddr') || '_______________';
  var cliEmail = v('cliEmail');
  var cliReg = v('cliReg');
  var prov = v('provName') || 'STCLOGIC Co., Ltd.';
  var provAddr = v('provAddr') || 'Seoul, Republic of Korea';
  var rawDate = v('contDate');
  var dateStr;
  if(rawDate) {
    var dt = new Date(rawDate);
    if(lang==='ko') dateStr = dt.getFullYear()+'년 '+(dt.getMonth()+1)+'월 '+dt.getDate()+'일';
    else if(lang==='ja') dateStr = dt.getFullYear()+'年'+(dt.getMonth()+1)+'月'+dt.getDate()+'日';
    else dateStr = dt.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  } else {
    dateStr = lang==='ko'?'____년 __월 __일':lang==='ja'?'____年__月__日':'___ __________ 20__';
  }
  var fee = v('feeAmt') ? 'USD '+v('feeAmt') : '_______________';
  var services = getServices();
  var serviceList = services.length>0
    ? services.map(function(s,i){ return '<li>'+(i+1)+'. '+s+'</li>'; }).join('')
    : d.noServices;

  var td = tier ? t.tiers[tier] : null;
  var jd = juri ? t.juris[juri] : null;
  var cno = contractNum();

  var tierBlock = td ? '<div class="tier-highlight"><div class="th-label">'+d.tierBoxLabel(td.label)+'</div>'
    +'<p><strong>'+d.feeRange+'</strong> '+t.tiers[tier===''?'std':tier].label+' (USD)</p>'
    +'<p><strong>'+d.retainerLabel+'</strong> '+td.retainer+' '+d.retainerSuffix+'</p>'
    +'<p><strong>'+d.durationLabel+'</strong> '+td.duration+' '+d.durationSuffix+'</p>'
    +'<p><strong>'+d.supportLabel+'</strong> '+td.support+'</p>'
    +'<p><strong>'+d.deliverablesLabel+'</strong> '+td.deliverables+'</p>'
    +'</div>' : '<p>'+d.noTier+'</p>';

  var juriBlock = jd ? '<div class="juri-highlight">'
    +'<p><strong>'+d.juriBodyLabel+'</strong> '+jd.body+'</p>'
    +'<p><strong>'+d.juriRulesLabel+'</strong> '+jd.rules+'</p>'
    +'<p><strong>'+d.juriSeatLabel+'</strong> '+jd.seat+'</p>'
    +'<p><strong>'+d.juriLawLabel+'</strong> '+jd.law+'</p>'
    +'</div>' : '<p>'+d.noJuri+'</p>';

  var dynData = { serviceList:serviceList, tierBlock:tierBlock, juriBlock:juriBlock, fee:fee, retainer:td?td.retainer:'___' };

  var tlShown = document.getElementById('tlBadge').classList.contains('show');
  var tlRefTxt = document.getElementById('tlHashSpan') ? document.getElementById('tlHashSpan').textContent : '';
  var tlTimeTxt = document.getElementById('tlTimeSpan') ? document.getElementById('tlTimeSpan').textContent : '';

  var html = '<div class="doc-ref">'+d.cnoPrefix+cno+'</div>'
    +'<h1>'+d.title+'</h1>'
    +'<p class="doc-subtitle">'+d.subtitle+'</p>'
    +'<div class="ornament">✦ ── ❦ ── ✦</div>'
    +'<div class="parties-box">'
    +'<div class="party"><div class="p-role">'+d.provRole+'</div><div class="p-name">'+prov+'</div>'
    +'<div class="p-detail">'+provAddr+' · stclogic@gmail.com · bookcoupling.netlify.app</div></div>'
    +'<div class="party"><div class="p-role">'+d.cliRole+'</div><div class="p-name">'+cli+'</div>'
    +'<div class="p-detail">'+cliAddr+(cliEmail?' · '+cliEmail:'')+(cliReg?' · Reg.: '+cliReg:'')+'</div></div>'
    +'</div>'
    +'<p>'+d.intro(prov,cli,dateStr)+'</p>'
    +'<div class="ornament">── ❦ ──</div>';

  d.clauses.forEach(function(c){
    html += '<div class="clause"><div class="clause-title">'+c.num+'. '+c.title+'</div>';
    html += c.body(dynData);
    html += '</div>';
  });

  html += '<div class="ornament">✦ ── ❦ ── ✦</div>'
    +'<p style="text-align:center;font-size:0.8rem;color:#888;">'+d.witnessClause+'</p>'
    +'<div class="sig-grid">'
    +'<div class="sig-box"><div class="sig-role">'+d.sigAdvisorRole+'</div><div class="sig-name">'+prov+'</div><div class="sig-line"></div><div class="sig-date">'+d.sigAuth+' &nbsp;&nbsp; '+d.sigDate+' ___________</div></div>'
    +'<div class="sig-box"><div class="sig-role">'+d.sigPrincipalRole+'</div><div class="sig-name">'+cli+'</div><div class="sig-line"></div><div class="sig-date">'+d.sigAuth+' &nbsp;&nbsp; '+d.sigDate+' ___________</div></div>'
    +'</div>'
    +'<div class="tl-seal'+(tlShown?' show':'')+'" id="tlSeal">'
    +d.tlSealPrefix+'<br>'
    +d.tlSealRef+' <strong id="tlSealRef">'+tlRefTxt+'</strong> &nbsp;|&nbsp; '
    +d.tlSealTime+' <span id="tlSealTime">'+tlTimeTxt+'</span>'
    +'</div>';

  document.getElementById('contractDoc').innerHTML = html;
}

function uploadTrustLock() {
  var t = I18N[lang];
  if(!v('cliName') || !tier || !juri) { alert(t.tlMissing); return; }
  var hash = 'TL-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();
  var now = new Date().toLocaleString(lang==='ko'?'ko-KR':lang==='ja'?'ja-JP':'en-GB',{dateStyle:'long',timeStyle:'short'});
  var badge = document.getElementById('tlBadge');
  badge.innerHTML = t.tlDone+'<br><strong id="tlHashSpan">'+t.tlRef+hash+'</strong><br><span id="tlTimeSpan">'+t.tlTime+now+'</span>';
  badge.classList.add('show');
  render();
  alert(t.tlAlert(hash,now));
}

document.getElementById('contDate').value = new Date().toISOString().slice(0,10);
applyUI();
render();
