<html lang="en">
<head>

<link rel="stylesheet" href="assets/css/site.css">
<style>
.cg-wrap { display: grid; grid-template-columns: 390px 1fr; gap: 0; min-height: 100vh; }
.cg-panel { background: var(--white); border-right: 1px solid var(--border); padding: 1.5rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.cg-preview { background: var(--cream); padding: 2rem; overflow-y: auto; }

.cg-lang { display: flex; gap: 4px; margin-bottom: 1.25rem; }
.cg-lang button { padding: 5px 13px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; transition: all .15s; }
.cg-lang button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.cg-back { display: inline-flex; align-items: center; gap: 5px; font-size: 0.78rem; color: var(--text2); text-decoration: none; margin-bottom: 1rem; transition: color .15s; }
.cg-back:hover { color: var(--primary); }

.cg-panel-title { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; padding-bottom: 0.9rem; border-bottom: 1px solid var(--border); }
.cg-section { margin-bottom: 1.25rem; }
.cg-label { font-size: 0.73rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 0.4rem; display: block; }
.cg-input { width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; color: var(--text); background: var(--cream); transition: border .15s; box-sizing: border-box; }
.cg-input:focus { outline: none; border-color: var(--primary); background: var(--white); }
.cg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }

/* Jurisdiction */
.juri-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
.juri-card { border: 2px solid var(--border); border-radius: 10px; padding: 0.7rem; cursor: pointer; text-align: center; transition: all .15s; }
.juri-card:hover, .juri-card.active { border-color: var(--primary); background: var(--primary-light); }
.juri-flag { font-size: 1.3rem; margin-bottom: 0.2rem; }
.juri-name { font-size: 0.78rem; font-weight: 700; color: var(--text); }
.juri-sub { font-size: 0.66rem; color: var(--text2); }

/* Purpose checkboxes */
.cb-item { display: flex; align-items: flex-start; gap: 8px; font-size: 0.83rem; color: var(--text); margin-bottom: 0.45rem; cursor: pointer; }
.cb-item input { margin-top: 2px; flex-shrink: 0; accent-color: var(--primary); }

/* Progress */
.prog-bar { height: 4px; background: var(--border); border-radius: 4px; margin-bottom: 0.4rem; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #ec4899); border-radius: 4px; transition: width .3s; }
.prog-text { font-size: 0.72rem; color: var(--text2); text-align: right; margin-bottom: 1.25rem; }

/* Buttons */
.btn-pdf { width: 100%; padding: 11px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 0.88rem; font-weight: 700; cursor: pointer; margin-bottom: 0.5rem; transition: opacity .15s; }
.btn-pdf:hover { opacity: .88; }
.btn-trust { width: 100%; padding: 11px; background: linear-gradient(135deg,#7c3aed,#4f46e5); color: #fff; border: none; border-radius: 10px; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.btn-trust:hover { opacity: .88; }
.trust-badge { margin-top: 0.6rem; font-size: 0.72rem; color: #5b21b6; background: #ede9fe; border-radius: 8px; padding: 7px 10px; display: none; }

/* Contract doc */
.doc-wrap { background: var(--white); max-width: 780px; margin: 0 auto; padding: 3.5rem 4rem; border-radius: 12px; box-shadow: 0 2px 24px rgba(0,0,0,.07); font-size: 0.88rem; line-height: 1.75; color: var(--text); }
.doc-meta { text-align: right; font-size: 0.75rem; color: var(--text2); margin-bottom: 2rem; }
.doc-title { text-align: center; font-size: 1.35rem; font-weight: 900; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--text); }
.doc-subtitle { text-align: center; font-size: 0.78rem; color: var(--text2); letter-spacing: .06em; margin-bottom: 2rem; }
.doc-ornament { text-align: center; color: var(--text2); margin: 1.2rem 0; letter-spacing: .2em; font-size: 0.85rem; }
.parties-box { border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem 1.4rem; margin-bottom: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.party-col .party-role { font-size: 0.68rem; text-transform: uppercase; letter-spacing: .07em; color: var(--text2); margin-bottom: 0.2rem; font-weight: 700; }
.party-col .party-name { font-weight: 800; font-size: 0.95rem; color: var(--text); }
.party-col .party-detail { font-size: 0.78rem; color: var(--text2); margin-top: 0.15rem; }
.doc-intro { margin-bottom: 1.5rem; font-size: 0.87rem; }
.doc-clause { margin-bottom: 1.4rem; }
.doc-clause-title { font-weight: 800; font-size: 0.92rem; margin-bottom: 0.5rem; color: var(--text); }
.doc-clause p { margin-bottom: 0.5rem; }
.doc-clause ul { margin: 0.4rem 0 0.4rem 1.2rem; }
.doc-clause ul li { margin-bottom: 0.25rem; }

.juri-box { background: #eff6ff; border-left: 3px solid #3b82f6; border-radius: 6px; padding: 0.8rem 1rem; margin: 0.6rem 0; font-size: 0.82rem; color: #1e3a5f; }
.juri-box strong { color: #1d4ed8; }

.sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2.5rem; }
.sig-block { border-top: 1px solid var(--text); padding-top: 0.5rem; }
.sig-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); margin-bottom: 0.3rem; font-weight: 700; }
.sig-name { font-weight: 700; font-size: 0.88rem; }
.sig-line { margin-top: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; font-size: 0.75rem; color: var(--text2); }
.tl-seal { text-align: center; margin-top: 1.5rem; font-size: 0.72rem; color: #5b21b6; background: #ede9fe; border-radius: 8px; padding: 8px; display: none; }

/* Signature section */
#sigSection { background: var(--white); max-width: 780px; margin: 1.5rem auto 0; padding: 2.5rem 4rem 3rem; border-radius: 12px; box-shadow: 0 2px 24px rgba(0,0,0,.07); font-size: 0.88rem; }
.sig-section-title { font-weight: 800; font-size: 0.92rem; margin-bottom: 1.5rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); color: var(--text); }
.sig-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
.sig-pad-wrap { border-top: 2px solid var(--text); padding-top: 0.6rem; }
.sig-pad-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); font-weight: 700; margin-bottom: 0.25rem; }
.sig-pad-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 0.7rem; }
.sig-canvas { width: 100%; height: 110px; border: 1.5px solid var(--border); border-radius: 8px; background: #fafafa; cursor: crosshair; display: block; touch-action: none; }
.sig-canvas-label { font-size: 0.68rem; color: var(--text2); text-align: center; margin-top: 3px; }
.sig-clear { font-size: 0.68rem; color: var(--primary); background: none; border: none; cursor: pointer; padding: 0; margin-top: 2px; text-decoration: underline; }
.sig-fields { margin-top: 0.9rem; display: flex; flex-direction: column; gap: 0.5rem; }
.sig-field-row { display: flex; flex-direction: column; gap: 2px; }
.sig-field-label { font-size: 0.68rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; }
.sig-field-input { border: none; border-bottom: 1px solid var(--border); background: none; font-size: 0.83rem; color: var(--text); padding: 3px 0; width: 100%; outline: none; }
.sig-field-input:focus { border-bottom-color: var(--primary); }
.sig-tl-seal { text-align: center; margin-top: 1.5rem; font-size: 0.72rem; color: #5b21b6; background: #ede9fe; border-radius: 8px; padding: 8px; display: none; }

@media print {
  #sigSection { box-shadow: none; border-radius: 0; padding: 1.5cm 2.5cm; max-width: 100%; margin-top: 0; }
  .sig-canvas { border: 1px solid #ccc; }
  .sig-clear { display: none !important; }
}

@media print {
  .cg-panel, .site-nav { display: none !important; }
  .cg-wrap { display: block; }
  .cg-preview { padding: 0; background: white; }
  .doc-wrap { box-shadow: none; border-radius: 0; padding: 2cm 2.5cm; max-width: 100%; }
  body { background: white; }
}
</style>
</head>

<div class="cg-wrap">
<!-- ===== PANEL ===== -->
<div class="cg-panel">
  <div class="cg-lang">
    <button id="lb-en" class="active" onclick="setLang('en')">EN</button>
    <button id="lb-ko" onclick="setLang('ko')">KO</button>

    <span class="cg-label" id="ui-partyBLabel">Party B (Receiving Party)</span>

    <div class="cg-row" style="margin-top:6px">
      <input class="cg-input" id="partyBEmail" oninput="render()" placeholder="Email">
      <input class="cg-input" id="partyBReg" oninput="render()" placeholder="Reg. No. (optional)">

  </div>

  <!-- Contract Date -->
  <div class="cg-section">
    <span class="cg-label" id="ui-dateLabel">Agreement Date</span>
    <input class="cg-input" type="date" id="contDate" oninput="render()">
  </div>

  <!-- Purpose -->
  <div class="cg-section">
    <span class="cg-label" id="ui-purposeLabel">Business Purpose</span>
    <div id="purpose-checks"></div>
  </div>

  <!-- Jurisdiction -->
  <div class="cg-section">
    <span class="cg-label" id="ui-juriLabel">Governing Law & Arbitration</span>

        <div class="juri-sub">SIAC Rules</div>
      </div>
      <div class="juri-card" id="j-ae" onclick="setJuri('ae')">
        <div class="juri-flag">🇦🇪</div>
        <div class="juri-name">Dubai</div>
        <div class="juri-sub">DIAC / DIFC-LCIA</div>
      </div>
    </div>
  </div>

  <!-- Term -->
  <div class="cg-section">
    <span class="cg-label" id="ui-termLabel">Agreement Term</span>
    <select class="cg-input" id="termYears" onchange="render()">
      <option value="2">2 Years</option>
      <option value="3" selected>3 Years</option>
      <option value="5">5 Years</option>
      <option value="10">10 Years</option>
    </select>
  </div>

  <!-- Buttons -->
  <button class="btn-pdf" id="ui-btnPdf" onclick="savePDF()">📄 Save PDF / Print</button>
  <button class="btn-trust" id="ui-btnTrust" onclick="uploadTrustLock()">🔒 Preserve via Trust-Lock</button>
  <div class="trust-badge" id="trustBadge"></div>
</div>

<!-- ===== PREVIEW ===== -->
<div class="cg-preview">
  <div id="contractDoc">
    <div class="doc-wrap">
      <p style="text-align:center;color:#bbb;padding:3rem 0;" id="emptyMsg">← Fill in the panel to generate the agreement.</p>
    </div>
  </div>
  <div id="sigSection" style="display:none;"></div>
</div>
</div>

<script>

var juri = 'sg';

var I18N = {
  en: {
    panelTitle: '🔐 NCND Agreement',
    partyALabel: 'Party A (Disclosing Party)',
    partyBLabel: 'Party B (Receiving Party)',
    dateLabel: 'Agreement Date',
    purposeLabel: 'Business Purpose (select all that apply)',
    juriLabel: 'Governing Law & Arbitration',
    termLabel: 'Agreement Term',
    btnPdf: '📄 Save PDF / Print',
    btnTrust: '🔒 Preserve via Trust-Lock',
    backBtn: '← Back to Contracts',
    progText: function(p){ return p+'% — '+(p<50?'Please fill in the details':p<80?'Almost complete':'Ready to generate'); },
    emptyMsg: '← Fill in the panel to generate the agreement.',
    navHome: 'Home', navContracts: 'Contracts',

      {v:'spv', label:'SPV / SPC Structuring'},

    docTitle: 'MUTUAL NON-CIRCUMVENTION AND NON-DISCLOSURE AGREEMENT',
    docSub: 'CONFIDENTIAL · FOR EXECUTION ONLY',
    ornament: '✦ ——— ⚖ ——— ✦',
    roleA: "Party A ('Disclosing Party')",
    roleB: "Party B ('Receiving Party')",
    intro: function(a, b, date, jd) {
      return "This Mutual Non-Circumvention and Non-Disclosure Agreement (\"<strong>Agreement</strong>\") is entered into as of <strong>"+date+"</strong> by and between <strong>"+a+"</strong> (\"<strong>Party A</strong>\") and <strong>"+b+"</strong> (\"<strong>Party B</strong>\"), collectively referred to as the \"<strong>Parties</strong>.\"";
    },
    clauses: function(a, b, purposes, termYears, jd) {
      var ps = purposes.length ? purposes.join(', ') : '[business purposes]';
      return [
        { title: "1. Definitions and Interpretation",
          body: "<p>In this Agreement, the following terms shall have the meanings set out below:</p><ul><li><strong>\"Confidential Information\"</strong> means all data, materials, products, specifications, manuals, business plans, financial information, software, marketing plans, contact details, trade secrets, proprietary processes, and any other non-public information disclosed or submitted by either Party, whether orally, in writing, electronically, or by any other means, in relation to the Business Opportunity defined herein.</li><li><strong>\"Business Opportunity\"</strong> means the proposed cooperation between the Parties in connection with: <em>"+ps+"</em>.</li><li><strong>\"Disclosing Party\"</strong> means the Party disclosing Confidential Information.</li><li><strong>\"Receiving Party\"</strong> means the Party receiving Confidential Information.</li></ul><p>Confidential Information shall not include information that: (a) is or becomes publicly available through no act of the Receiving Party; (b) was lawfully in the Receiving Party's possession prior to disclosure; (c) is independently developed by the Receiving Party without reference to Confidential Information; or (d) is disclosed with the prior written consent of the Disclosing Party.</p>" },
        { title: "2. Non-Disclosure Obligations",
          body: "<p>Each Party agrees that, unless required by applicable law, regulation, or regulatory authority:</p><ul><li>All Confidential Information received from the other Party shall be held strictly confidential and treated as proprietary;</li><li>Confidential Information shall only be used for the purpose of evaluating and pursuing the Business Opportunity;</li><li>Confidential Information shall not be disclosed to any third party without prior written authorization from the Disclosing Party, except to officers, directors, employees, legal counsel, financial advisors, or consultants who have a legitimate need to know and are bound by equivalent confidentiality obligations;</li><li>The Receiving Party shall implement reasonable security measures to safeguard Confidential Information against unauthorized access, disclosure, or use;</li><li>Written authorization to disclose Confidential Information shall include authorization provided via secure electronic communication or an executed letter of engagement.</li></ul><p>In the event that the Receiving Party is required by law or legal process to disclose Confidential Information, the Receiving Party shall promptly notify the Disclosing Party and cooperate to seek a protective order or equivalent remedy prior to any disclosure.</p>" },
        { title: "3. Non-Circumvention",
          body: "<p>Each Party expressly undertakes not to circumvent, bypass, avoid, or otherwise render ineffective the role of the other Party or any intermediary introduced by either Party in connection with the Business Opportunity, including but not limited to:</p><ul><li>Contacting, negotiating with, or entering into any agreement with any counterpart, investor, financier, introducer, agent, broker, or other party introduced by or through the other Party, without the prior written consent of the introducing Party;</li><li>Attempting to conclude, directly or indirectly, any transaction relating to the Business Opportunity without the full participation and compensation of the introducing Party;</li><li>Taking any action designed to remove, replace, or minimize the economic benefit due to the other Party in connection with the Business Opportunity.</li></ul><p>Any breach of this non-circumvention obligation shall entitle the non-breaching Party to liquidated damages equal to the greater of: (a) twice (2×) the economic benefit that would have been payable to the non-breaching Party; or (b) USD 500,000, without prejudice to any other remedy available at law or equity.</p>" },
        { title: "4. Undertakings of the Parties",
          body: "<p>Each Party hereby represents, warrants, and undertakes that:</p><ul><li>It has full authority to enter into this Agreement and to perform its obligations hereunder;</li><li>Its entry into and performance of this Agreement will not violate any applicable laws, regulations, or obligations owed to any third party;</li><li>All information provided to the other Party in connection with the Business Opportunity is, to the best of its knowledge, accurate, complete, and not misleading;</li><li>It will promptly notify the other Party of any actual or potential breach of this Agreement upon becoming aware of such breach;</li><li>It shall comply with all applicable anti-money laundering (AML), counter-financing of terrorism (CFT), and know-your-customer (KYC) laws and regulations in all jurisdictions relevant to the Business Opportunity.</li></ul>" },
        { title: "5. Term and Survival",
          body: "<p>This Agreement shall remain in full force and effect for a period of <strong>"+termYears+" ("+termYears+") years</strong> from the date of execution (the \"<strong>Term</strong>\").</p><p>Notwithstanding the expiry of the Term, the obligations of confidentiality set forth in Clause 2 shall survive for a further period of <strong>five (5) years</strong> following the end of the Term with respect to any Confidential Information disclosed during the Term. The non-circumvention obligations under Clause 3 shall survive for the duration of any transaction or business relationship introduced under this Agreement, regardless of the expiry of the Term.</p>" },
        { title: "6. Return or Destruction of Information",
          body: "<p>Upon written request by the Disclosing Party, or upon termination or expiry of this Agreement, the Receiving Party shall promptly:</p><ul><li>Return to the Disclosing Party all tangible materials containing Confidential Information; or</li><li>Permanently destroy all Confidential Information in its possession (including digital copies and backup files) and certify such destruction in writing.</li></ul><p>Notwithstanding the above, the Receiving Party may retain one (1) archival copy of Confidential Information solely for the purposes of legal compliance or dispute resolution, subject to the continuing confidentiality obligations herein.</p>" },
        { title: "7. Remedies and Injunctive Relief",
          body: "<p>The Parties acknowledge that any breach of this Agreement would cause irreparable harm to the non-breaching Party for which monetary damages alone would be an inadequate remedy. Accordingly, in addition to all other remedies available, the non-breaching Party shall be entitled to seek immediate injunctive or other equitable relief from any court of competent jurisdiction without the requirement to post bond or prove actual damages.</p><p>The prevailing Party in any dispute arising from or relating to this Agreement shall be entitled to recover reasonable legal fees and costs from the non-prevailing Party.</p>" },
        { title: "8. Limitation of Liability",
          body: "<p>Neither Party shall be liable to the other for any indirect, incidental, consequential, special, or punitive damages arising from or relating to this Agreement, even if advised of the possibility of such damages, except in cases of willful misconduct, gross negligence, or breach of the non-circumvention obligations in Clause 3.</p>" },
        { title: "9. No License or Partnership",
          body: "<p>Nothing in this Agreement shall be construed as granting either Party any license, right, title, or interest in or to any Confidential Information, intellectual property, or business opportunity of the other Party, except as expressly set forth herein. This Agreement does not create any partnership, joint venture, agency, franchise, or employment relationship between the Parties.</p>" },
        { title: "10. Trust-Lock Blockchain Preservation",
          body: "<p>The Parties acknowledge that this Agreement may be preserved via STCLOGIC's Trust-Lock blockchain archiving service (available at fincoupling.netlify.app/#/trust-lock). Upon upload, a cryptographic hash of this document shall be recorded on-chain, creating an immutable and time-stamped record of its existence and content at the time of preservation.</p><p>Such blockchain record shall serve as admissible evidence of the Agreement's existence and terms in any arbitration or legal proceeding, subject to applicable rules of evidence.</p>" },
        { title: "11. Governing Law and Dispute Resolution",
          body: "<div class='juri-box'>"+jd.box+"</div><p>This Agreement and any dispute or claim arising out of or in connection with it (including non-contractual disputes or claims) shall be governed by, and construed in accordance with, the laws of <strong>"+jd.law+"</strong>.</p><p>Any dispute, controversy, or claim arising out of or relating to this Agreement, or the breach, termination, or invalidity thereof, shall be finally settled by arbitration administered by the <strong>"+jd.body+"</strong> in accordance with "+jd.rules+". The seat of arbitration shall be <strong>"+jd.seat+"</strong>. The language of arbitration shall be English. The arbitral award shall be final and binding upon both Parties.</p>" },
        { title: "12. Miscellaneous",
          body: "<p><strong>Entire Agreement:</strong> This Agreement constitutes the entire agreement between the Parties with respect to its subject matter and supersedes all prior agreements, representations, warranties, and understandings.</p><p><strong>Amendments:</strong> No amendment or modification of this Agreement shall be valid unless made in writing and signed by authorized representatives of both Parties.</p><p><strong>Severability:</strong> If any provision of this Agreement is found to be invalid, illegal, or unenforceable, the remaining provisions shall continue in full force and effect.</p><p><strong>Waiver:</strong> Failure by either Party to enforce any provision of this Agreement shall not constitute a waiver of that Party's rights to enforce such provision in the future.</p><p><strong>Counterparts:</strong> This Agreement may be executed in counterparts, including electronically signed counterparts, each of which shall constitute an original and all of which together shall constitute one and the same instrument.</p>" },
        { title: "13. Signatures",

function v(id){ return document.getElementById(id) ? document.getElementById(id).value : ''; }
function getPurposes(){
  var t = I18N[lang];
  var items = [];
  document.querySelectorAll('#purpose-checks input:checked').forEach(function(cb){
    var s = t.purposes.find(function(p){ return p.v===cb.value; });
    if(s) items.push(s.label);
  });
  return items;
}

function contractNum(){
  var d = v('contDate').replace(/-/g,'') || new Date().toISOString().slice(0,10).replace(/-/g,'');
  var n = v('partyBName') ? v('partyBName').replace(/\s+/g,'').toUpperCase().slice(0,4) : 'XXXX';
  return 'STC-NCND-'+d+'-'+n;
}

function fmtDate(iso){
  if(!iso) return '________________';
  var parts = iso.split('-');
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[parseInt(parts[1])-1]+' '+parseInt(parts[2])+', '+parts[0];
}

function updateProgress(){
  var score = 10;
  if(v('partyBName').trim()) score += 25;
  if(v('partyBAddr').trim()) score += 10;
  if(v('partyBEmail').trim()) score += 10;
  if(v('contDate')) score += 15;
  if(document.querySelectorAll('#purpose-checks input:checked').length) score += 20;
  score = Math.min(score, 100);
  document.getElementById('progFill').style.width = score+'%';
  var t = I18N[lang];
  document.getElementById('progText').textContent = t.progText(score);
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function initCanvas(side){
  var canvas = document.getElementById('sigCanvas'+side);
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Restore saved image
  var saved = sigState[side.toLowerCase()+'Img'];
  if(saved){ var img = new Image(); img.onload = function(){ ctx.drawImage(img,0,0); }; img.src = saved; }

  var drawing = false, lx, ly;

  function pos(e){
    var r = canvas.getBoundingClientRect();
    var scaleX = canvas.width / r.width;
    var scaleY = canvas.height / r.height;
    var src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * scaleX, y: (src.clientY - r.top) * scaleY };
  }
  function start(e){ e.preventDefault(); drawing=true; var p=pos(e); lx=p.x; ly=p.y; }
  function move(e){ if(!drawing) return; e.preventDefault(); var p=pos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke(); lx=p.x; ly=p.y; }
  function end(e){ if(!drawing) return; drawing=false; sigState[side.toLowerCase()+'Img'] = canvas.toDataURL(); }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end);
}

function clearCanvas(side){
  var canvas = document.getElementById('sigCanvas'+side);
  if(!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  sigState[side.toLowerCase()+'Img'] = '';
}

    lbl.className = 'cb-item';
    lbl.innerHTML = '<input type="checkbox" value="'+s.v+'" onchange="render()"> '+s.label;
    if(prev[s.v]) lbl.querySelector('input').checked = true;
    cb.appendChild(lbl);
  });

  // Update term select options
  var sel = document.getElementById('termYears');
  var cur = sel.value;
  sel.innerHTML = '';
  Object.keys(t.termOpts).forEach(function(k){
    var opt = document.createElement('option');
    opt.value = k; opt.textContent = t.termOpts[k];
    if(k === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}

function setLang(l){
  lang = l;
  localStorage.setItem('contract-lang', l);
  ['lb-en','lb-ko','lb-ja'].forEach(function(id){
    document.getElementById(id).classList.toggle('active', id==='lb-'+l);
  });
  document.documentElement.lang = l;
  if (typeof window.syncNavLang === 'function') window.syncNavLang(l);
  applyUI();
  render();
}

function savePDF(){
  window.print();
}

function uploadTrustLock(){
  var t = I18N[lang];
  // 서명 완료 검증
  if(!sigState.aImg || !sigState.bImg){ alert(t.sigAlertCanvas); return; }
  if(!sigState.aName.trim() || !sigState.aDate){ alert(t.sigAlertFieldsA); return; }
  if(!sigState.bName.trim() || !sigState.bDate){ alert(t.sigAlertFieldsB); return; }

  var hash = 'TL-'+Date.now().toString(36).toUpperCase()+'-'+contractNum().slice(-6);
  var badge = document.getElementById('trustBadge');
  badge.textContent = t.tlText(hash);
  badge.style.display = 'block';
  var seal = document.getElementById('tlSeal');
  if(seal){ seal.style.display = 'block'; seal.textContent = t.tlText(hash); }
  setTimeout(function(){
    window.open('https://fincoupling.netlify.app/#/trust-lock','_blank');
  }, 600);
}
