<link rel="stylesheet" href="assets/css/site.css">
<style>
.cg-wrap { display: grid; grid-template-columns: 360px 1fr; gap: 0; min-height: 100vh; }

.cg-lang { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 1.25rem; }

.cg-lang button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.cg-back { display: inline-flex; align-items: center; gap: 5px; font-size: 0.78rem; color: var(--text2); text-decoration: none; margin-bottom: 1rem; transition: color .15s; }
.cg-back:hover { color: var(--primary); }

.cg-panel-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; padding-bottom: 0.9rem; border-bottom: 1px solid var(--border); }
.cg-section { margin-bottom: 1.25rem; }
.cg-label { font-size: 0.73rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 0.4rem; display: block; }
.cg-input { width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; color: var(--text); background: var(--cream); transition: border .15s; box-sizing: border-box; }
.cg-input:focus { outline: none; border-color: var(--primary); background: var(--white); }

.btn-pdf { width: 100%; padding: 11px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 0.88rem; font-weight: 700; cursor: pointer; margin-bottom: 0.5rem; transition: opacity .15s; }
.btn-pdf:hover { opacity: .88; }
.btn-trust { width: 100%; padding: 11px; background: linear-gradient(135deg,#7c3aed,#4f46e5); color: #fff; border: none; border-radius: 10px; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.btn-trust:hover { opacity: .88; }
.trust-badge { margin-top: 0.6rem; font-size: 0.72rem; color: #5b21b6; background: #ede9fe; border-radius: 8px; padding: 7px 10px; display: none; }

.doc-ornament { text-align: center; color: var(--text2); margin: 1.2rem 0; letter-spacing: .2em; font-size: 0.85rem; }

.party-role { font-size: 0.68rem; text-transform: uppercase; letter-spacing: .07em; color: var(--text2); margin-bottom: 0.2rem; font-weight: 700; }
.party-name { font-weight: 800; font-size: 0.95rem; color: var(--text); }
.party-detail { font-size: 0.78rem; color: var(--text2); margin-top: 0.15rem; }
.doc-intro { margin-bottom: 1.5rem; font-size: 0.87rem; font-style: italic; color: var(--text2); border-left: 3px solid var(--primary); padding-left: 1rem; }
.doc-article { margin-bottom: 1.8rem; }
.doc-article-title { font-weight: 800; font-size: 0.95rem; margin-bottom: 0.7rem; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.35rem; }
.doc-article ol { margin: 0; padding-left: 1.4rem; }
.doc-article ol li { margin-bottom: 0.6rem; }
.doc-article ul { margin: 0.4rem 0 0.4rem 1.2rem; }
.doc-article ul li { margin-bottom: 0.3rem; }
.doc-highlight { background: #eff6ff; border-left: 3px solid #3b82f6; border-radius: 6px; padding: 0.7rem 1rem; margin: 0.5rem 0; font-size: 0.83rem; color: #1e3a5f; }

.sig-pad-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); font-weight: 700; margin-bottom: 0.25rem; }
.sig-pad-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 0.7rem; }
.sig-canvas { width: 100%; height: 110px; border: 1.5px solid var(--border); border-radius: 8px; background: #fafafa; cursor: crosshair; display: block; touch-action: none; }
.sig-canvas-label { font-size: 0.68rem; color: var(--text2); text-align: center; margin-top: 3px; }
.sig-clear { font-size: 0.68rem; color: var(--primary); background: none; border: none; cursor: pointer; padding: 0; margin-top: 2px; text-decoration: underline; }
.sig-fields { margin-top: 0.9rem; display: flex; flex-direction: column; gap: 0.5rem; }
.sig-field-row { display: flex; flex-direction: column; gap: 2px; }
.sig-field-label { font-size: 0.68rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; }
.sig-field-input { border: none; border-bottom: 1px solid var(--border); background: none; font-size: 0.83rem; color: var(--text); padding: 3px 0; width: 100%; outline: none; }
.sig-field-input:focus { border-bottom-color: var(--primary); }
.sig-tl-seal { text-align: center; margin-top: 1.5rem; font-size: 0.72rem; color: #5b21b6; background: #ede9fe; border-radius: 8px; padding: 8px; display: none; }
.spv-note { background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: 0.8rem 1rem; margin-top: 1.5rem; font-size: 0.78rem; color: #166534; }

@media print {
  .cg-panel, .site-nav { display: none !important; }
  .cg-wrap { display: block; }
  .cg-preview { padding: 0; background: white; }
  .doc-wrap { box-shadow: none; border-radius: 0; padding: 2cm 2.5cm; max-width: 100%; }
  #sigSection { box-shadow: none; border-radius: 0; padding: 1.5cm 2.5cm; max-width: 100%; margin-top: 0; }
  .sig-canvas { border: 1px solid #ccc; }
  .sig-clear { display: none !important; }
  body { background: white; }
}
@media (max-width: 900px) {
  .cg-wrap { grid-template-columns: 1fr; }
  .cg-panel { position: static; height: auto; }
  .sig-grid2 { grid-template-columns: 1fr; }
}
</style>
</head>

<div class="cg-wrap">

</div>
</div>

// ── Signature state ──────────────────────────────────────────────────────
var sigState = { aName:'', aTitle:'', aDate:'', bName:'', bTitle:'', bDate:'', aImg:'', bImg:'' };

// ── Render ───────────────────────────────────────────────────────────────
function contractNum(){
  var today = new Date(); var y = today.getFullYear();
  var m = String(today.getMonth()+1).padStart(2,'0');
  var d = String(today.getDate()).padStart(2,'0');
  return 'FC-SC-'+y+m+d+'-0001';
}

    document.getElementById('sigSection').style.display = 'none';
    return;
  }

  var articlesHtml = t.articles.map(function(a){
    return '<div class="doc-article"><div class="doc-article-title">'+a.num+'. '+a.title+'</div>'+a.body+'</div>';
  }).join('');

  var html = '<div class="doc-wrap">'
    +'<div class="doc-meta">'+t.contractNo+': '+contractNum()+'</div>'
    +'<div style="text-align:center;margin-bottom:0.8rem"><span class="doc-badge">'+t.docBadge+'</span></div>'
    +'<div class="doc-title">'+t.docTitle+'</div>'
    +'<div class="doc-subtitle">'+t.docSub+'</div>'
    +'<div class="doc-ornament">——— ⚖ ———</div>'
    +'<div class="parties-box">'
      +'<div><div class="party-role">'+t.providerRole+'</div><div class="party-name">FinCoupling</div><div class="party-detail">bookcoupling.netlify.app</div></div>'
      +'<div><div class="party-role">'+t.applicantRole+'</div><div class="party-name">'+escHtml(app)+'</div>'+(org?'<div class="party-detail">'+escHtml(org)+'</div>':'')+'</div>'
    +'</div>'
    +'<div class="doc-intro">'+t.intro(app, org, date, slots)+'</div>'
    +'<div class="doc-ornament" style="margin-bottom:1.5rem">——— ⚖ ———</div>'
    +articlesHtml
    +'<div class="spv-note">'+t.spvNote+'</div>'

  sec.style.display = 'block';
  sec.innerHTML =
    '<div class="sig-section-title">'+t.sigSectionTitle+'</div>'
    +'<div class="sig-grid2">'
    // Provider
    +'<div class="sig-pad-wrap">'
      +'<div class="sig-pad-label">'+t.providerRole+'</div>'
      +'<div class="sig-pad-name">FinCoupling</div>'
      +'<canvas id="sigCanvasA" class="sig-canvas" width="320" height="110"></canvas>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;">'
        +'<span class="sig-canvas-label">'+t.sigDrawHint+'</span>'
        +'<button class="sig-clear" onclick="clearCanvas(\'A\')">'+t.sigClear+'</button>'
      +'</div>'
      +'<div class="sig-fields">'
        +'<div class="sig-field-row"><span class="sig-field-label">'+t.sigNameLabel+'</span><input class="sig-field-input" id="sigAName" placeholder="'+t.sigNameLabel+'" value="'+escHtml(sigState.aName)+'" oninput="sigState.aName=this.value"></div>'
        +'<div class="sig-field-row"><span class="sig-field-label">'+t.sigTitleLabel+'</span><input class="sig-field-input" id="sigATitle" placeholder="'+t.sigTitleLabel+'" value="'+escHtml(sigState.aTitle)+'" oninput="sigState.aTitle=this.value"></div>'
        +'<div class="sig-field-row"><span class="sig-field-label">'+t.sigDateLabel+'</span><input class="sig-field-input" id="sigADate" type="date" value="'+escHtml(sigState.aDate)+'" oninput="sigState.aDate=this.value"></div>'
      +'</div>'
    +'</div>'
    // Applicant
    +'<div class="sig-pad-wrap">'
      +'<div class="sig-pad-label">'+t.applicantRole+'</div>'
      +'<div class="sig-pad-name">'+escHtml(app)+'</div>'
      +'<canvas id="sigCanvasB" class="sig-canvas" width="320" height="110"></canvas>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;">'
        +'<span class="sig-canvas-label">'+t.sigDrawHint+'</span>'
        +'<button class="sig-clear" onclick="clearCanvas(\'B\')">'+t.sigClear+'</button>'
      +'</div>'
      +'<div class="sig-fields">'
        +'<div class="sig-field-row"><span class="sig-field-label">'+t.sigNameLabel+'</span><input class="sig-field-input" id="sigBName" placeholder="'+t.sigNameLabel+'" value="'+escHtml(sigState.bName)+'" oninput="sigState.bName=this.value"></div>'
        +'<div class="sig-field-row"><span class="sig-field-label">'+t.sigTitleLabel+'</span><input class="sig-field-input" id="sigBTitle" placeholder="'+t.sigTitleLabel+'" value="'+escHtml(sigState.bTitle)+'" oninput="sigState.bTitle=this.value"></div>'
        +'<div class="sig-field-row"><span class="sig-field-label">'+t.sigDateLabel+'</span><input class="sig-field-input" id="sigBDate" type="date" value="'+escHtml(sigState.bDate)+'" oninput="sigState.bDate=this.value"></div>'
      +'</div>'

  }
}

function initCanvas(side){
  var canvas = document.getElementById('sigCanvas'+side);
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  var saved = sigState[side.toLowerCase()+'Img'];
  if(saved){ var img = new Image(); img.onload = function(){ ctx.drawImage(img,0,0); }; img.src = saved; }
  var drawing = false, lx, ly;
  function pos(e){
    var r = canvas.getBoundingClientRect();
    var sx = canvas.width/r.width, sy = canvas.height/r.height;
    var src = e.touches ? e.touches[0] : e;
    return {x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
  }
  function start(e){ e.preventDefault(); drawing=true; var p=pos(e); lx=p.x; ly=p.y; }
  function move(e){ if(!drawing) return; e.preventDefault(); var p=pos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke(); lx=p.x; ly=p.y; }
  function end(){ if(!drawing) return; drawing=false; sigState[side.toLowerCase()+'Img']=canvas.toDataURL(); }
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end);
}

function clearCanvas(side){
  var canvas = document.getElementById('sigCanvas'+side);
  if(!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  sigState[side.toLowerCase()+'Img']='';
}

  var t = I18N[lang];
  ['lb-en','lb-ko','lb-ja','lb-zh','lb-th'].forEach(function(id){
    document.getElementById(id).classList.toggle('active', id==='lb-'+lang);
  });
  document.getElementById('backBtn').textContent = t.backBtn;
  document.getElementById('ui-panelTitle').textContent = t.panelTitle;
  document.getElementById('ui-applicantLabel').textContent = t.applicantLabel;
  document.getElementById('ui-applicantOrgLabel').textContent = t.applicantOrgLabel;
  document.getElementById('ui-dateLabel').textContent = t.dateLabel;
  document.getElementById('ui-slotsLabel').textContent = t.slotsLabel;
  document.getElementById('ui-btnPdf').textContent = t.btnPdf;
  document.getElementById('ui-btnTrust').textContent = t.btnTrust;
}

function setLang(l){
  lang = l;
  localStorage.setItem('sc-lang', l);
  document.documentElement.lang = l;
  if(typeof window.syncNavLang === 'function') window.syncNavLang(l);
  applyUI();
  render();
}

function uploadTrustLock(){
  var t = I18N[lang];
  if(!v('applicantName')){ alert(t.emptyMsg); return; }
  if(!sigState.aImg || !sigState.bImg){ alert(t.sigAlertCanvas); return; }
  if(!sigState.aName.trim() || !sigState.aDate){ alert(t.sigAlertFieldsA); return; }
  if(!sigState.bName.trim() || !sigState.bDate){ alert(t.sigAlertFieldsB); return; }
  var hash = 'TL-'+Date.now().toString(36).toUpperCase()+'-'+contractNum().slice(-6);
  var badge = document.getElementById('trustBadge');
  badge.textContent = t.tlText(hash);
  badge.style.display = 'block';
  var seal = document.getElementById('tlSeal');
  if(seal){ seal.style.display='block'; seal.textContent=t.tlText(hash); }
  setTimeout(function(){ window.open('https://fincoupling.netlify.app/#/trust-lock','_blank'); }, 600);
}
