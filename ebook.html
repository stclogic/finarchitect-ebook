let currentLang = 'ko';

function renderChapters(lang) {
  const d = LANGS[lang];
  const list = document.getElementById('chapterList');
  list.innerHTML = d.chapters.map(ch => `
    <div class="chapter-item ${ch.free ? '' : 'locked'}" ${ch.free && ch.url ? `onclick="location.href='${ch.url}'"` : ''}>
      <div class="chapter-num">${ch.num}</div>
      <div class="chapter-info">
        <div class="chapter-name">${ch.name}</div>
        <div class="chapter-meta">${ch.meta}</div>
      </div>
      ${ch.free
        ? `<span class="badge-free">FREE</span><span class="chapter-arrow">›</span>`
        : `<span class="badge-unlock">잠금 해제</span>`
      }
    </div>
  `).join('');

  // cover
  const cover = document.getElementById('bookCover');
  cover.style.background = d.coverBg;
  document.querySelector('.book-cover-bar').style.background = d.coverBar;
  document.querySelector('.book-cover-circle').style.borderColor = d.circleColor;
  document.getElementById('coverTitle').innerHTML = d.coverTitle;
  document.getElementById('coverSub').textContent = d.coverSub;
  document.getElementById('coverLang').textContent = d.lang;
  document.getElementById('freeCount').textContent = d.freeCount;
  document.getElementById('upgradePrice').textContent = d.upgradePrice;
}

document.querySelectorAll('.lang-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    renderChapters(currentLang);
  });
});
