.page-header h1 {

.page-header p {

/* ── 언어 탭 ── */

  padding: 0 2rem;
  display: flex;
  gap: 0.5rem;
}
.lang-tab {
  padding: 7px 20px;
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--text2);

  transition: all .15s;
}
.lang-tab.active {
  background: var(--dark);
  color: var(--white);
  border-color: var(--dark);
}

/* ── 메인 레이아웃 ── */
.ebook-layout {
  max-width: 1100px;
  margin: 2rem auto 5rem;
  padding: 0 2rem;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 2rem;
  align-items: start;
}

/* ── 책 커버 ── */
.book-mockup-wrap {
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  aspect-ratio: 2/3;
  background: var(--dark);
  position: sticky;
  top: 90px;
}
.book-mockup-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ── 읽기 진행 카드 ── */
.book-progress-card {
  margin-top: 1rem;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
}
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 0.6rem;
}
.progress-pct {
  color: var(--accent);
  font-weight: 700;
}
.progress-bar {
  height: 6px;
  background: var(--cream);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 0.6rem;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
  transition: width .4s;
}
.progress-sub {
  font-size: 0.75rem;
  color: var(--text3);
}

/* ── 목차 헤더 ── */
.chapter-list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.chapter-list-title {
  font-size: 1rem;
  font-weight: 800;
  color: var(--dark);
}
.free-count {
  font-size: 0.78rem;
  color: var(--text3);
  font-weight: 600;
}

/* ── 챕터 아이템 ── */
.chapter-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.85rem 1rem;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--white);
  margin-bottom: 0.5rem;
  cursor: pointer;
  transition: all .15s;
}
.chapter-item:hover:not(.locked) {
  border-color: var(--primary);
  background: var(--primary-light);
}
.chapter-item.locked {
  cursor: default;
  opacity: 0.7;
}
.chapter-num {
  width: 28px;
  height: 28px;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text2);
  flex-shrink: 0;
}
.chapter-item:not(.locked) .chapter-num {
  background: var(--primary);
  border-color: var(--primary);
  color: var(--white);
}
.chapter-info { flex: 1; min-width: 0; }
.chapter-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chapter-meta {
  font-size: 0.75rem;
  color: var(--text3);
  margin-top: 2px;
}
.badge-free {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 999px;
  background: #22C55E;
  color: #fff;
  flex-shrink: 0;
}
.badge-unlock {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--cream);
  border: 1px solid var(--border);
  color: var(--text3);
  flex-shrink: 0;
}
.chapter-arrow {
  font-size: 1.1rem;
  color: var(--primary);
  font-weight: 700;
  flex-shrink: 0;
}

/* ── 업그레이드 배너 ── */
.upgrade-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;

.upgrade-banner-text .title {

.btn-upgrade {

let currentLang = localStorage.getItem('site-lang') || 'ko';

function renderChapters(lang) {
  const d = LANGS[lang] || LANGS.ko;
  const lockLabel = (window.SITE_I18N && SITE_I18N[lang] && SITE_I18N[lang]['ebook.badge.lock']) || '잠금 해제';

  document.getElementById('chapterList').innerHTML = d.chapters.map((ch, i) => `
    <div class="chapter-item${ch.free ? '' : ' locked'}" onclick="handleChapterClick(LANGS['${lang}'].chapters[${i}])">
      <div class="chapter-num">${ch.num}</div>
      <div class="chapter-info">
        <div class="chapter-name">${ch.name}</div>
        <div class="chapter-meta">${ch.meta}</div>
      </div>
      ${ch.free
        ? `<span class="badge-free">FREE</span><span class="chapter-arrow">›</span>`
        : `<span class="badge-unlock">🔒 ${lockLabel}</span>`
      }
    </div>
  `).join('');

  document.getElementById('bookMockupImg').src = COVER_IMAGES[lang] || COVER_IMAGES.ko;
  document.getElementById('freeCount').textContent = d.freeCount;
  document.getElementById('upgradePrice').textContent = d.upgradePrice;
}

// 언어 탭 클릭
document.querySelectorAll('.lang-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    renderChapters(currentLang);
    // 사이트 언어도 동기화
    if (typeof applyLang === 'function') applyLang(currentLang);
  });
});

// applyLang 연동

  // 탭 active 동기화
  document.querySelectorAll('.lang-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang)
  );
  renderChapters(lang);
};

// 초기 렌더
renderChapters(currentLang);

// 초기 탭 active 동기화
document.querySelectorAll('.lang-tab').forEach(b =>
  b.classList.toggle('active', b.dataset.lang === currentLang)
);

// ── 챕터 클릭 처리 (유료 챕터 결제) ──────────────
function handleChapterClick(ch) {
  // 무료 챕터: 로그인 없이 바로 열람
  if (ch.free) {
    if (ch.url) location.href = ch.url;
    return;
  }
  // 유료 챕터: 로그인 + 구매 확인
  const user = window.getAuthUser ? window.getAuthUser() : null;
  if (!user) { window.openAuthModal && window.openAuthModal('login'); return; }
  if (user.email === 'stclogic@gmail.com') { location.href = ch.url || BOOK_INFO[CURRENT_BOOK_ID].readUrl; return; }
  window.getSupabaseClient().then(sb => {
    sb.from('book_purchases').select('id')
      .eq('user_id', user.id).eq('book_id', CURRENT_BOOK_ID).maybeSingle()
      .then(({ data }) => {
        if (data) {
          location.href = ch.url || BOOK_INFO[CURRENT_BOOK_ID].readUrl;
        } else {
          handleBookPurchase();
        }
      });
  });
}

// ── 책 구매 처리 ────────────────────────────────
const BOOK_INFO = {
  'money-arch': { title: '구조로 돈을 설계하는 사람들', price: 49, readUrl: 'index.html' },
  'hnwi-code':  { title: 'HNWI코드: 부자들의 비밀 이민전략', price: 49, readUrl: 'index.html' },
};
const CURRENT_BOOK_ID = 'money-arch';

function handleBookPurchase() {
  const info = BOOK_INFO[CURRENT_BOOK_ID];
  window.startBookPayment({
    bookId: CURRENT_BOOK_ID,
    title: info.title,
    price: info.price,
    readUrl: info.readUrl,
  });
}

// 로그인 버튼 연결
document.addEventListener('DOMContentLoaded', () => {
  const loginBtn = document.querySelector('.btn-login');
  if (loginBtn) loginBtn.addEventListener('click', () => openAuthModal('login'));
});
</script>
