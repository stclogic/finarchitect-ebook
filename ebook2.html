const FREE_COUNTS = { ko: '3 / 29 챕터 무료', en: '3 / 29 Chapters Free', ja: '3 / 29 チャプター無料' };
const UPGRADE_PRICES = {
  ko: '$49 USD · 글로벌 자산가의 이민 전략 완전판',
  en: '$49 USD · Complete HNWI Immigration Strategy',
  ja: '$49 USD · グローバル資産家の移民戦略完全版',
};

let currentLang = localStorage.getItem('site-lang') || 'ko';

function renderChapters(lang) {
  const list = CHAPTERS[lang] || CHAPTERS.ko;
  document.getElementById('freeCount').textContent = FREE_COUNTS[lang] || FREE_COUNTS.ko;
  document.getElementById('upgradePrice').textContent = UPGRADE_PRICES[lang] || UPGRADE_PRICES.ko;

  document.getElementById('chapterList').innerHTML = list.map((ch, i) => `
    <div class="chapter-item${ch.free ? '' : ' locked'}" onclick="handleChapterClick(${i}, '${lang}')">
      <div class="chapter-num">${ch.num}</div>
      <div class="chapter-info">
        <div class="chapter-name">${ch.name}</div>
        ${ch.meta ? `<div class="chapter-meta">${ch.meta}</div>` : ''}
      </div>
      ${ch.free
        ? `<span class="badge-free">FREE</span><span class="chapter-arrow">›</span>`
        : `<span class="badge-unlock">🔒 잠금 해제</span>`
      }
    </div>
  `).join('');
}

function handleChapterClick(idx, lang) {
  const ch = (CHAPTERS[lang] || CHAPTERS.ko)[idx];
  if (!ch) return;

  if (ch.free) {
    location.href = ch.url || 'index2.html';
    return;
  }

  // 유료 챕터: 로그인 확인 후 구매 여부 체크
  const user = window.getAuthUser ? window.getAuthUser() : null;
  if (!user) {
    window.openAuthModal && window.openAuthModal('login');
    return;
  }

  // 구매 확인 후 reader로 이동 또는 결제 페이지로
  (async () => {
    try {
      const cfg = await fetch('/.netlify/functions/get-config').then(r => r.json());
      const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
      const sb = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
      const { data } = await sb.from('book_purchases').select('id')
        .eq('user_id', user.id).eq('book_id', 'hnwi-code').maybeSingle();
      if (data) {
        location.href = 'index2.html?ch=' + (idx); // 해당 챕터로 이동
      } else {
        location.href = 'pricing.html';
      }
    } catch (e) {
      location.href = 'pricing.html';
    }
  })();
}

// 언어 탭
document.querySelectorAll('.lang-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    renderChapters(currentLang);
    if (typeof applyLang === 'function') applyLang(currentLang);
  });
});

const _origApply = window.applyLang;
window.applyLang = function(lang) {
  if (_origApply) _origApply(lang);
  currentLang = lang;
  document.querySelectorAll('.lang-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang)
  );
  renderChapters(lang);
};

renderChapters(currentLang);
document.querySelectorAll('.lang-tab').forEach(b =>
  b.classList.toggle('active', b.dataset.lang === currentLang)
);
</script>
