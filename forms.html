      { name: '주택 임대차 계약서', format: 'DOCX', locked: false },

    ]
  },
];

const FMT_CLASS = { DOCX: 'fmt-docx', PDF: 'fmt-pdf', HWP: 'fmt-hwp' };

let currentCat = '전체';

function renderGrid(cat) {
  const sets = cat === '전체' ? FORM_SETS : FORM_SETS.filter(s => s.cat === cat);
  const grid = document.getElementById('formsGrid');
  grid.innerHTML = sets.map(s => `
    <div class="form-card" onclick="openModal('${s.id}')">
      <div class="form-card-top-bar" style="background:${s.color}"></div>
      <div style="display:flex; align-items:flex-start; justify-content:space-between;">
        <div class="form-card-icon" style="background:${s.iconBg}"">📦</div>
        <span class="${s.premium ? 'form-card-premium' : 'form-card-free'}">${s.premium ? 'PREMIUM' : 'FREE'}</span>
      </div>
      <span class="form-card-cat-tag" style="background:${s.iconBg}; color:${s.catColor}">${s.cat}</span>
      <div class="form-card-title">${s.title}</div>
      <div class="form-card-desc">${s.desc}</div>
      <div class="form-card-footer">
        <span>${s.count}종 포함</span>
        <span class="vol-link">${s.vol}</span>
      </div>
      <div class="form-card-actions">
        <button class="btn-card-preview" onclick="event.stopPropagation(); openModal('${s.id}')">미리보기</button>
        <button class="btn-card-download" style="background:${s.color}" onclick="event.stopPropagation()">⬇ 다운로드</button>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const s = FORM_SETS.find(f => f.id === id);
  if (!s) return;
  document.getElementById('modalTitle').textContent = s.title;
  document.getElementById('modalCount').textContent = `${s.count}종 포함`;
  document.getElementById('modalIcon').style.background = s.iconBg;
  document.getElementById('modalBody').innerHTML = s.files.map((f, i) => `
    <div class="file-item ${i % 3 === 2 ? 'highlighted' : ''}">
      <div class="file-check"></div>
      <div class="file-doc-icon">📄</div>
      <div class="file-name">${f.name}</div>
      ${f.locked ? '<span class="file-lock">🔒</span>' : ''}
      <span class="file-format ${FMT_CLASS[f.format] || ''}">${f.format}</span>
    </div>
  `).join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.querySelectorAll('.cat-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderGrid(currentCat);
  });
});

document.querySelectorAll('.quick-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.getElementById('searchInput').value = chip.dataset.q;
  });
});

renderGrid('전체');
</script>
