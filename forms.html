      { name: { ko: '스톡옵션 계약서',   en: 'Stock Option Agreement',           ja: 'ストックオプション契約書' }, format: 'DOCX', locked: true },
    ]
  },
];

const FMT_CLASS = { DOCX: 'fmt-docx', PDF: 'fmt-pdf', HWP: 'fmt-hwp' };
let currentCatId = 'all';
let openModalId = null;

function getLang() {
  return (typeof getSiteLang === 'function' ? getSiteLang() : null)
      || localStorage.getItem('site-lang') || 'ko';
}

function t(key) {
  const lang = getLang();
  return (FORMS_I18N[lang] || FORMS_I18N.ko)[key] || FORMS_I18N.ko[key] || key;
}

function tx(obj) {
  const lang = getLang();
  return obj[lang] || obj.ko;
}

// ── 카테고리 탭 렌더 ─────────────────────────────────────────────
function renderCatTabs() {
  const lang = getLang();
  document.getElementById('catTabs').innerHTML = CATS.map(c => `
    <button class="cat-tab${currentCatId === c.id ? ' active' : ''}" data-catid="${c.id}">${c[lang] || c.ko}</button>
  `).join('');
  document.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCatId = btn.dataset.catid;
      renderCatTabs();
      renderGrid();
      renderFeatured();
      updateGridLabel();
    });
  });
}

// ── 퀵칩 렌더 ────────────────────────────────────────────────────
function renderChips() {
  const chips = ['startup','realty','labor','tax','corp'];
  document.getElementById('quickChips').innerHTML = chips.map(k => `
    <button class="quick-chip">${t('chip.' + k)}</button>
  `).join('');
  document.querySelectorAll('.quick-chip').forEach((chip, i) => {
    chip.addEventListener('click', () => {
      document.getElementById('searchInput').value = chip.textContent;
    });
  });
}

// ── Featured 세트 렌더 (startup 고정) ────────────────────────────
function renderFeatured() {
  const s = FORM_SETS.find(x => x.id === 'startup');
  document.getElementById('featuredSet').innerHTML = `
    <div class="featured-set-icon">📦</div>
    <div class="featured-set-info">
      <div class="featured-set-badges">
        <span class="badge-featured">${t('badge.featured')}</span>
        <span class="badge-cat">${tx(s.cat)}</span>
        <span class="badge-premium">PREMIUM</span>
      </div>
      <div class="featured-set-title">${tx(s.title)}</div>
      <div class="featured-set-sub">${tx(s.desc)} · ${s.count}${t('card.count.suffix')}</div>
    </div>
    <div class="featured-set-actions">
      <button class="btn-preview" onclick="openModal('startup')">${t('btn.preview')}</button>
      <button class="btn-download">⬇ ${t('btn.download').replace('⬇ ','')}</button>
    </div>
  `;
}

// ── 그리드 레이블 ─────────────────────────────────────────────────
function updateGridLabel() {
  const sets = currentCatId === 'all' ? FORM_SETS : FORM_SETS.filter(s => s.catId === currentCatId);
  const label = t('grid.label');
  const suffix = t('grid.count.suffix');
  const lang = getLang();
  // 일본어: "6セット", 영어: "6 sets", 한국어: "6개"
  const countStr = lang === 'en' ? `${sets.length}${suffix}` : `${sets.length}${suffix}`;
  document.getElementById('gridLabel').innerHTML = `${label} <span class="count">${countStr}</span>`;
  document.getElementById('filterBtn').textContent = t('filter.btn');
}

// ── 그리드 렌더 ──────────────────────────────────────────────────
function renderGrid() {
  const sets = currentCatId === 'all' ? FORM_SETS : FORM_SETS.filter(s => s.catId === currentCatId);
  document.getElementById('formsGrid').innerHTML = sets.map(s => `
    <div class="form-card" onclick="openModal('${s.id}')">
      <div class="form-card-top-bar" style="background:${s.color}"></div>
      <div style="display:flex; align-items:flex-start; justify-content:space-between;">
        <div class="form-card-icon" style="background:${s.iconBg}">📦</div>
        <span class="${s.premium ? 'form-card-premium' : 'form-card-free'}">${s.premium ? 'PREMIUM' : 'FREE'}</span>
      </div>
      <span class="form-card-cat-tag" style="background:${s.iconBg}; color:${s.catColor}">${tx(s.cat)}</span>
      <div class="form-card-title">${tx(s.title)}</div>
      <div class="form-card-desc">${tx(s.desc)}</div>
      <div class="form-card-footer">
        <span>${s.count}${t('card.count.suffix')}</span>
        <span class="vol-link">${tx(s.vol)}</span>
      </div>
      <div class="form-card-actions">
        <button class="btn-card-preview" onclick="event.stopPropagation(); openModal('${s.id}')">${t('btn.preview')}</button>
        <button class="btn-card-download" style="background:${s.color}" onclick="event.stopPropagation()">${t('btn.download')}</button>
      </div>
    </div>
  `).join('');
}

// ── 모달 ─────────────────────────────────────────────────────────
function openModal(id) {
  const s = FORM_SETS.find(f => f.id === id);
  if (!s) return;
  openModalId = id;
  document.getElementById('modalTitle').textContent = tx(s.title);
  document.getElementById('modalCount').textContent = `${s.count}${t('modal.count.suffix')}`;
  document.getElementById('modalIcon').style.background = s.iconBg;
  document.getElementById('modalDetailBtn').textContent = t('modal.detail');
  document.getElementById('modalDlBtn').textContent = t('modal.dlAll');
  document.getElementById('modalBody').innerHTML = s.files.map((f, i) => {
    const canDl = !f.locked && f.path;
    const dlAttr = canDl ? `style="cursor:pointer" onclick="downloadForm('${f.path}','${tx(f.name).replace(/'/g,'\\\'')}')"` : '';
    return `
    <div class="file-item ${i % 3 === 2 ? 'highlighted' : ''} ${canDl ? 'file-item-dl' : ''}" ${dlAttr}>
      <div class="file-check">${canDl ? '✓' : ''}</div>
      <div class="file-doc-icon">📄</div>
      <div class="file-name">${tx(f.name)}</div>
      ${f.locked ? '<span class="file-lock">🔒</span>' : (canDl ? '<span class="file-dl-hint">⬇</span>' : '')}
      <span class="file-format ${FMT_CLASS[f.format] || ''}">${f.format}</span>
    </div>`;
  }).join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function downloadForm(path, name) {
  const a = document.createElement('a');
  a.href = path;
  a.download = name + '.docx';
  a.click();
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  openModalId = null;
}

// ── 검색창 placeholder 갱신 ──────────────────────────────────────
function updateSearch() {
  document.getElementById('searchInput').placeholder = t('search.placeholder');
  document.getElementById('aiBtnLabel').textContent = t('ai.btn');
}

// ── 전체 렌더 ────────────────────────────────────────────────────
function renderAll() {
  renderCatTabs();
  renderChips();
  renderFeatured();
  updateGridLabel();
  renderGrid();
  updateSearch();
  // 모달이 열려 있으면 모달 텍스트도 갱신
  if (openModalId) openModal(openModalId);
}

renderAll();
</script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/nav.js?v=2"></script>
<script>
// i18n.js 로드 후 applyLang 를 가로채서 forms 재렌더 연결
(function() {
  const _orig = window.applyLang;
  window.applyLang = function(lang) {
    if (_orig) _orig(lang);
    renderAll();
  };
})();
</script>
</body>
</html>
