<style>
.form-page-wrap {
  max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 5rem;
  display: grid; grid-template-columns: 280px 1fr; gap: 2rem; align-items: start;
}
.ctrl-panel {
  background: #fff; border: 1px solid #e2e8f0;
  border-radius: 18px; padding: 1.5rem; position: sticky; top: 80px;
  box-shadow: 0 4px 24px rgba(30,43,74,.08);
}
.ctrl-panel h2 { font-size: .97rem; font-weight: 800; color: #1E2B4A; margin-bottom: 1.2rem; }
.ctrl-section { margin-bottom: .9rem; }
.ctrl-section label { display: block; font-size: .77rem; font-weight: 700; color: #64748b; margin-bottom: .28rem; }
.ctrl-section input, .ctrl-section select, .ctrl-section textarea {
  width: 100%; padding: 8px 10px;
  border: 1px solid #e2e8f0; border-radius: 8px;
  font-size: .85rem; color: #1E2B4A; background: #f8fafc; box-sizing: border-box;
}
.ctrl-section textarea { resize: vertical; min-height: 60px; }
.ctrl-divider { height: 1px; background: #e2e8f0; margin: 1rem 0; }
.print-btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg,#1E2B4A,#3B82F6); color: #fff;
  border: none; border-radius: 12px; font-size: .95rem; font-weight: 700; cursor: pointer;
}
.print-btn:hover { opacity: .88; }
.reset-btn {
  width: 100%; padding: 9px; margin-top: .6rem;
  background: none; border: 1px solid #e2e8f0;
  border-radius: 10px; font-size: .82rem; color: #64748b; cursor: pointer;
}
.tip-box {
  background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 10px;
  padding: .8rem 1rem; font-size: .76rem; color: #1E40AF; line-height: 1.65; margin-top: .8rem;
}
.back-link {
  display: inline-flex; align-items: center; gap: .3rem;
  font-size: .82rem; color: #64748b; text-decoration: none;
  padding: 7px 14px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 1rem;
}
.back-link:hover { background: #EFF6FF; }
.doc-wrap {
  background: #DBEAFE; border-radius: 14px; padding: 2rem 1rem;
  display: flex; flex-direction: column; align-items: center;
}
/* A4 */
.doc-page {
  width: 210mm; min-height: 297mm; background: #fff;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
  padding: 14mm 14mm 12mm; font-family: 'Noto Serif KR','Malgun Gothic',serif;
  font-size: 10pt; color: #222; box-sizing: border-box;
}
/* Header */
.doc-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6mm; }
.logo-area { display: flex; align-items: center; gap: 10px; }
.logo-img { width: 36px; height: 36px; object-fit: contain; border-radius: 6px; display: none; }
.logo-placeholder { width: 36px; height: 36px; border: 1.5px dashed #94a3b8; border-radius: 6px; display: flex; align-items:center; justify-content:center; color:#94a3b8; font-size:9px; text-align:center; line-height:1.2; cursor:pointer; }
.doc-num-badge { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 6px; padding: 3px 10px; font-size: 8pt; color: #1E40AF; }
/* Big title */
.big-title-wrap { text-align: center; margin: 4mm 0 7mm; position: relative; }
.title-deco { display: flex; align-items: center; gap: 8px; justify-content: center; }
.deco-line { flex: 1; height: 2px; background: linear-gradient(90deg,transparent,#1E2B4A); }
.deco-line.right { background: linear-gradient(90deg,#1E2B4A,transparent); }
.big-title { font-size: 20pt; font-weight: 700; color: #1E2B4A; letter-spacing: 10px; padding: 0 4mm; }
.big-title-sub { font-size: 8.5pt; color: #64748b; letter-spacing: 2px; margin-top: 2mm; }
/* Recipient box */
.recipient-box {
  border: 2px solid #1E2B4A; border-radius: 10px; padding: 4mm 5mm; margin-bottom: 5mm;
  background: #F0F7FF; position: relative;
}
.recipient-box::before {
  content: '수 임 인'; position: absolute; top: -9px; left: 12px;
  background: #1E2B4A; color: #fff; font-size: 7.5pt; font-weight: 700;
  padding: 1px 8px; border-radius: 9px;
}
.recip-row { display: flex; gap: 6mm; flex-wrap: wrap; margin-bottom: 2mm; font-size: 9.5pt; }
.recip-item { display: flex; gap: 4px; align-items: flex-end; flex: 1; min-width: 50mm; }
.recip-lbl { color: #64748b; white-space: nowrap; font-size: 9pt; }
.recip-val { flex: 1; border-bottom: 1px solid #94a3b8; min-height: 14px; outline: none; padding-bottom: 1px; }
/* Delegation stmt */
.delegation-stmt {
  font-size: 10pt; font-weight: 600; color: #1E2B4A;
  text-align: center; padding: 3mm 0;
  border-top: 1px solid #BFDBFE; border-bottom: 1px solid #BFDBFE;
  margin: 4mm 0; line-height: 1.8;
}
/* Table */
.detail-table { width: 100%; border-collapse: collapse; margin: 4mm 0; font-size: 9.5pt; }
.detail-table th {
  background: #1E2B4A; color: #fff; padding: 2.5mm 3mm;
  text-align: center; font-weight: 700; width: 25%;
}
.detail-table td {
  border: 1px solid #cbd5e1; padding: 3mm;
  min-height: 12mm;
}
.detail-table td[contenteditable="true"] { min-height: 16mm; }
/* Delegator section */
.delegator-section { margin-top: 6mm; }
.delegator-box {
  border: 1.5px solid #cbd5e1; border-radius: 10px; padding: 4mm 5mm; margin-bottom: 4mm;
  background: #fafafa; position: relative;
}
.delegator-box::before {
  content: '위 임 인'; position: absolute; top: -9px; left: 12px;
  background: #64748b; color: #fff; font-size: 7.5pt; font-weight: 700;
  padding: 1px 8px; border-radius: 9px;
}
/* Sig area */
.sig-date { text-align: center; font-size: 10pt; color: #1E2B4A; font-weight: 600; margin: 4mm 0 3mm; }
.sig-row { display: flex; gap: 6mm; flex-wrap: wrap; margin-bottom: 2mm; font-size: 9.5pt; }
.sig-item { display: flex; gap: 4px; align-items: flex-end; flex: 1; min-width: 50mm; }
.sig-lbl { color: #64748b; white-space: nowrap; font-size: 9pt; }
.sig-val { flex: 1; border-bottom: 1px solid #94a3b8; min-height: 14px; outline: none; padding-bottom: 1px; }
.sig-final { display: flex; align-items: center; gap: 6mm; justify-content: flex-end; margin-top: 4mm; }
.sig-name-block { display: flex; align-items: flex-end; gap: 4px; font-size: 9.5pt; }
.stamp-circle {
  width: 22mm; height: 22mm; border: 1.5px dashed #dc2626; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #dc2626; font-size: 9pt; font-weight: 700; flex-shrink: 0;
}
/* Attachments */
.attach-box { margin-top: 4mm; border-top: 1px dashed #94a3b8; padding-top: 3mm; }
.attach-title { font-size: 9pt; font-weight: 700; color: #64748b; margin-bottom: 1.5mm; }
.attach-item { font-size: 9pt; color: #374151; display: flex; align-items: center; gap: 6px; margin-bottom: 1mm; }
.attach-item input[type=checkbox] { width: 13px; height: 13px; accent-color: #1E2B4A; }
[contenteditable="true"] { outline: none; }
[contenteditable="true"]:hover { background: rgba(59,130,246,.06); border-radius: 3px; }
[contenteditable="true"]:focus { background: #EFF6FF; border-radius: 3px; box-shadow: 0 0 0 2px #3B82F6; }
.lang-btns { display:flex; gap:4px; margin-top:4px; }
.lang-btn { flex:1; padding:5px 0; border-radius:8px; font-size:0.72rem; font-weight:800; border:1.5px solid var(--border,#e2e8f0); background:none; color:var(--text2,#64748b); cursor:pointer; transition:all .15s; }
.lang-btn:hover { border-color:#1E2B4A; color:#1E2B4A; }
.lang-btn.active { background:#1E2B4A; border-color:#1E2B4A; color:#fff; }
.lang-notice { font-size:0.68rem; color:#9CA3AF; margin-top:4px; line-height:1.4; }
@media print {
  .tip-box, .edit-hint, .edit-guide, .lang-notice, .lang-btns, .lang-notice, .cv-photo-hint, .cl-hint, .block-edit, .doc-top-bar, .top-bar, .rs-top-bar, .iou-top-bar { display: none !important; }
  .ctrl-panel, nav, footer, .back-link, .lang-btns, .lang-notice { display: none !important; }
  body { background: #fff !important; }
  .form-page-wrap { display: block !important; padding: 0 !important; }
  .doc-bg { background: none !important; padding: 0 !important; border-radius: 0 !important; box-shadow: none !important; }
  .a4-page { box-shadow: none !important; width: 100% !important; padding: 0 !important; margin: 0 !important; }

  /* A4 여백 — 상단 25mm로 새 페이지 시작 후 공간 확보 */
  @page { size: A4; margin: 15mm; }
  /* 서명란 인쇄 최적화: 줄바꿈 허용, 간격 축소 */
  .sig-row, .sign-row, .rs-sign-row, .party-sig-row,
  .sig-wrap, .sig-grid { 
    flex-wrap: wrap !important; 
    gap: 5mm !important; 
  }
  .sig-field, .rs-sign-item-field, .sign-field,
  .sig-name, .sig-line { 
    min-width: 30mm !important; 
  }
  /* 수신처/서명란 페이지 분리 방지 */
  .rs-addressee, .doc-addressee, .addressee-block,
  .sig-footer, .doc-footer-sig { 
    break-before: avoid !important; 
    page-break-before: avoid !important;
  }

  /* 섹션 단위 페이지 안 끊김 방지 */
  .clause, .article, .section-block, .cv-section,
  .parties-table, .info-table, .items-table,
  .agenda-item, .handover-row, .bp-section, .section-wrap,
  .minutes-item, .agenda-block, .approval-row { 
    break-inside: avoid; 
    page-break-inside: avoid; 
  }

  /* 제목 뒤에서 페이지 끊김 방지 (제목만 남고 내용이 다음 페이지로 가는 현상 방지) */
  .clause-title, .article-title, .section-title-doc,
  .bp-section-title, h2, h3, h4 { 
    break-after: avoid; 
    page-break-after: avoid; 
  }

  /* 테이블 행 끊김 방지 */
  tr { break-inside: avoid; page-break-inside: avoid; }
  thead { display: table-header-group; }
  tfoot { display: table-footer-group; }

  /* 서명란은 이전 내용과 함께 유지 */
  .sig-section, .sig-wrap, .signature-area, .sig-final,
  .sig-area, .sig-box, .parties-sig { 
    break-inside: avoid; 
    page-break-inside: avoid; 
    break-before: avoid; 
    page-break-before: avoid; 
  }
}

var _pseudoStyle = document.createElement('style');
document.head.appendChild(_pseudoStyle);

function _updateFormDate() {
  var _t = new Date();
  var _d = (LANG_DATA_FORM[_activeLang] || LANG_DATA_FORM.ko);
  if (!_d || !_d.dateFormatter) return;
  var ymd = _d.dateFormatter(_t.getFullYear(), _t.getMonth()+1, _t.getDate());
  var _el0 = document.getElementById('sigDate'); if (_el0) _el0.textContent = ymd;
}
var _activeLang = 'ko';
function setLang(lang) {
  _activeLang = lang;
  var d = LANG_DATA_FORM[lang];
  ['ko','en','ja'].forEach(function(l){ document.getElementById('btn-'+l).classList.toggle('active', l===lang); });
  document.getElementById('formDocTitle').innerHTML = d.docTitle;
  document.getElementById('formDocSub').textContent = d.docSub;
  document.getElementById('certText').textContent = d.certText;
  document.getElementById('sigPrefix').textContent = d.sigPrefix;
  d.tableHeaders.forEach(function(t, i){ var el = document.getElementById('th'+i); if(el) el.textContent = t; });
  _pseudoStyle.textContent = '.recipient-box::before{content:"' + d.agentLabel + '"!important}.delegator-box::before{content:"' + d.principalLabel + '"!important}';
  // ── 컨트롤 패널 UI ──
  var backLink = document.querySelector('.back-link');
  if (backLink) backLink.textContent = d.ctrlBackLink;
  var ctrlH2 = document.querySelector('.ctrl-panel h2');
  if (ctrlH2) ctrlH2.textContent = d.ctrlTitle;
  var langNotice = document.querySelector('.lang-notice');
  if (langNotice) langNotice.textContent = d.langNotice;
  var tipBox = document.querySelector('.tip-box');
  if (tipBox) tipBox.textContent = d.tipBox;
  var resetBtn = document.querySelector('.reset-btn');
  if (resetBtn) resetBtn.textContent = d.resetBtn;
  var printBtn = document.querySelector('.print-btn');
  if (printBtn) printBtn.textContent = d.printBtn;
  var ctrlLogoDiv = document.getElementById('ctrlLogoDiv');
  if (ctrlLogoDiv) ctrlLogoDiv.textContent = d.ctrlLogoBtn;
  var ctrlLbl0 = document.getElementById('ctrlLbl0');
  if (ctrlLbl0) ctrlLbl0.textContent = d.ctrlLbl0;
  var ctrlLbl1 = document.getElementById('ctrlLbl1');
  if (ctrlLbl1) ctrlLbl1.textContent = d.ctrlLbl1;
  // recipient/delegator field labels
  if (d.recipLabels) {
    var recipLbls = document.querySelectorAll('.recip-lbl');
    d.recipLabels.forEach(function(txt, i) { if (recipLbls[i]) recipLbls[i].textContent = txt; });
  }
  // sig suffix "(서명)"
  var sigSuffixEl = document.getElementById('sigSuffix');
  if (sigSuffixEl && d.sigSuffix) sigSuffixEl.textContent = d.sigSuffix;
  // stamp circles
  if (d.stampText) {
    document.querySelectorAll('.stamp-circle').forEach(function(el) { el.textContent = d.stampText; });
  }
  // attachments
  var attachTitleEl = document.getElementById('attachTitle');
  if (attachTitleEl && d.attachTitle) attachTitleEl.textContent = d.attachTitle;
  if (d.attachItems) {
    var attachEls = document.querySelectorAll('.attach-item');
    d.attachItems.forEach(function(html, i) { if (attachEls[i]) attachEls[i].innerHTML = html; });
  }

  localStorage.setItem('site-lang', lang);
  if (window.syncNavLang) window.syncNavLang(lang);
  _updateFormDate();
}

document.getElementById('docNum').addEventListener('input', function(){
  document.getElementById('docNumDisplay').textContent = this.value;
});

document.getElementById('logoInput').addEventListener('change', function(e){
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = document.getElementById('logoImg');
    img.src = ev.target.result; img.style.display = 'block';
    document.getElementById('logoPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

// 페이지 로드 시 저장 언어 자동 적용
(function() {
  var saved = localStorage.getItem('site-lang') || 'ko';
  if (saved !== 'ko') setLang(saved);
})();
</script>
