<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/jpeg" href="https://blogger.googleusercontent.com/img/a/AVvXsEiAG9mjc7D01ZuSOVpPIy7bQoHB7IjWDadH_zBaWymx3cKXVsqdFJlNP0URua9EgCDQSUS-4OeaLPJgHpcsmm90srnmDCZ0nUuoN9Xw-_0iL_NxZQOsRp83DEPuJiVOlKP5QTci3BBtUEc_37Sq-m0CAWhd9du_pSW91HmUP90sygR8y46CuhAhOQmj3mfR">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구조로 돈을 설계하는 사람들 — STCLOGIC</title>
  <meta name="description" content="금융은 감정이 아니라 구조다. PF, SPC, STO, Exit 전략까지 — 자금 흐름의 전체 지도.">
  <meta name="author" content="STCLOGIC">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script>
  (async function () {
    try {
      const user = JSON.parse(localStorage.getItem('site-user') || 'null');
      if (!user) { window.IS_FREE_ACCESS = true; return; }
      const cfg = await fetch('/.netlify/functions/get-config').then(r => r.json());
      const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
      const sb = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
      const { data } = await sb.from('book_purchases').select('id')
        .eq('user_id', user.id).eq('book_id', 'money-arch').maybeSingle();
      if (!data) window.IS_FREE_ACCESS = true;
    } catch (e) { console.error('접근 제어 오류:', e); window.IS_FREE_ACCESS = true; }
  })();
  </script>
</head>
<body>

<div class="app">

  <!-- 사이드바 오버레이 (모바일) -->
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- 사이드바 -->
  <nav class="sidebar" id="sidebar" aria-label="목차">
    <div class="sidebar-logo">
      <div class="logo-badge"><img src="https://blogger.googleusercontent.com/img/a/AVvXsEjxKvEL9PUcPTScga3wa0Zz4AipbUB38uUtfdFbdlAOLsd-XCT7btcPGUwX20iLXD9MWrs-AqbiTyjBFso1Rdyxwk6edunzCZxx_4DV8gvjukOyqNf6z9dCUyVtRWc_WtQ206sIPovFwiw7OtVbiJb84LFJUhxm2Vu2qOPZ63X7TRbrKvvAlX1hp70JI-HZ" alt="STCLOGIC"></div>
      <div class="logo-title">구조로 돈을<br>설계하는 사람들</div>
      <div class="logo-sub">금융은 감정이 아니라 구조다</div>
    </div>

    <div class="vol-switcher">
      <button class="vol-btn active" onclick="switchVol(1)">Vol.1 기초</button>
      <button class="vol-btn" onclick="switchVol(2)" style="opacity:0.4;cursor:default">Vol.2 실전</button>
    </div>

    <div class="search-wrap">
      <i class="ti ti-search search-icon" aria-hidden="true"></i>
      <input
        type="text"
        class="search-input"
        placeholder="챕터 검색..."
        aria-label="챕터 검색"
        oninput="handleSearch(event)"
      >
    </div>

    <div class="toc" id="toc" role="list"></div>
  </nav>

  <!-- 메인 영역 -->
  <main class="main" id="main">

    <!-- 상단 바 -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="메뉴 열기">
          <i class="ti ti-menu-2" aria-hidden="true"></i>
        </button>
        <nav class="topbar-sitenav">
          <a href="landing.html" class="tsn-link">홈</a>
          <a href="ebook.html" class="tsn-link tsn-active">eBook</a>
          <a href="forms.html" class="tsn-link">서식</a>
        </nav>
        <span id="breadcrumb-ch" style="display:none"></span>
      </div>
      <div class="topbar-right">
        <div class="font-size-wrap" aria-label="글자 크기 조절">
          <button onclick="changeFont(-1)" aria-label="글자 작게"><i class="ti ti-minus" aria-hidden="true"></i></button>
          <span id="font-size-val">16</span>
          <button onclick="changeFont(1)" aria-label="글자 크게"><i class="ti ti-plus" aria-hidden="true"></i></button>
        </div>
        <button class="tb-btn" id="bookmark-btn" onclick="saveBookmark()" aria-label="책갈피 저장">
          <i class="ti ti-bookmark" aria-hidden="true"></i>
        </button>
        <button class="tb-btn" id="theme-btn" onclick="toggleTheme()" aria-label="다크/라이트 모드 전환">
          <i class="ti ti-moon" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <!-- 읽기 진행바 -->
    <div class="progress-bar" role="progressbar" aria-label="읽기 진행률">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <!-- 콘텐츠 -->
    <div class="content" id="content">
      <p style="color:var(--text3);padding:2rem;text-align:center;">
        <i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:0.5rem;" aria-hidden="true"></i>
        콘텐츠를 불러오는 중...
      </p>
    </div>

  </main>
</div>

<script src="data/vol1.js?v=20260621"></script>
<script src="assets/js/viewer.js?v=20260622"></script>
<script>
  function switchVol(v) {
    if (v === 2) alert('Vol.2 누산타라 연대기는 준비 중입니다.');
  }
</script>
</body>
</html>
