<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구조로 돈을 설계하는 사람들 — STCLOGIC</title>
  <meta name="description" content="금융은 감정이 아니라 구조다. PF, SPC, STO, Exit 전략까지 — 자금 흐름의 전체 지도.">
  <meta name="author" content="STCLOGIC">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="app">

  <!-- 사이드바 오버레이 (모바일) -->
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- 사이드바 -->
  <nav class="sidebar" id="sidebar" aria-label="목차">
    <div class="sidebar-logo">
      <div class="logo-badge">STCLOGIC</div>
      <div class="logo-title">구조로 돈을<br>설계하는 사람들</div>
      <div class="logo-sub">금융은 감정이 아니라 구조다</div>
    </div>

    <div class="vol-switcher">
      <button class="vol-btn active" onclick="switchVol(1)">Vol.1 기초</button>
      <button class="vol-btn" onclick="switchVol(2)" style="opacity:0.4;cursor:default">Vol.2 실전</button>
    </div>

    <div class="search-wrap">
      <i class="ti ti-search search-icon" aria-hidden="true"></i>
      <input
        type="text"
        class="search-input"
        placeholder="챕터 검색..."
        aria-label="챕터 검색"
        oninput="handleSearch(event)"
      >
    </div>

    <div class="toc" id="toc" role="list"></div>
  </nav>

  <!-- 메인 영역 -->
  <main class="main" id="main">

    <!-- 상단 바 -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="메뉴 열기">
          <i class="ti ti-menu-2" aria-hidden="true"></i>
        </button>
        <nav class="topbar-sitenav">
          <a href="landing.html" class="tsn-link">홈</a>
          <a href="ebook.html" class="tsn-link tsn-active">eBook</a>
          <a href="forms.html" class="tsn-link">서식</a>
        </nav>
      </div>
      <div class="topbar-right">
        <div class="font-size-wrap" aria-label="글자 크기 조절">
          <button onclick="changeFont(-1)" aria-label="글자 작게"><i class="ti ti-minus" aria-hidden="true"></i></button>
          <span id="font-size-val">16</span>
          <button onclick="changeFont(1)" aria-label="글자 크게"><i class="ti ti-plus" aria-hidden="true"></i></button>
        </div>
        <button class="tb-btn" id="theme-btn" onclick="toggleTheme()" aria-label="다크/라이트 모드 전환">
          <i class="ti ti-moon" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <!-- 읽기 진행바 -->
    <div class="progress-bar" role="progressbar" aria-label="읽기 진행률">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <!-- 콘텐츠 -->
    <div class="content" id="content">
      <p style="color:var(--text3);padding:2rem;text-align:center;">
        <i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:0.5rem;" aria-hidden="true"></i>
        콘텐츠를 불러오는 중...
      </p>
    </div>

  </main>
</div>

<script src="data/vol1.js?v=20260621"></script>
<script src="assets/js/viewer.js"></script>
<script>
  function switchVol(v) {
    if (v === 2) alert('Vol.2 누산타라 연대기는 준비 중입니다.');
  }
</script>
</body>
</html>
