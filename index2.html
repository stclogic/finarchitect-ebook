<script>
  (async function () {
    try {
      const user = JSON.parse(localStorage.getItem('site-user') || 'null');
      // 미로그인 → 무료 챕터만 허용 (IS_FREE_ACCESS = true)
      if (!user) { window.IS_FREE_ACCESS = true; return; }
      if (user.email === 'stclogic@gmail.com') { return; }
      const cfg = await fetch('/.netlify/functions/get-config').then(r => r.json());
      const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
      const sb = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
      const { data } = await sb.from('book_purchases').select('id')
        .eq('user_id', user.id).eq('book_id', 'hnwi-code').maybeSingle();
      // 구매 기록 없으면 무료 챕터만 허용
      if (!data) window.IS_FREE_ACCESS = true;
    } catch (e) { console.error('접근 제어 오류:', e); window.IS_FREE_ACCESS = true; }
  })();
</script>

<script>
// vol2.js flat-section → viewer.js section→blocks 구조 변환 + 필드명 정규화
(function() {
  function adaptBlock(b) {
    var out = Object.assign({}, b);
    // body → type별 올바른 필드명으로 변환
    if (out.body !== undefined) {
      if (out.type === 'deep' || out.type === 'case') out.content = out.body;
      else if (out.type === 'prose' || out.type === 'formula' || out.type === 'story') out.text = out.body;
      delete out.body;
    }
    // case: label 기본값
    if (out.type === 'case' && !out.label) out.label = '사례';
    // point: items[] → 여러 point 블록으로 분리 (나중에 section wrap 시 처리)
    // summary: title 기본값
    if (out.type === 'summary' && !out.title) out.title = '핵심 요약';
    // formula: body 텍스트를 prose로 다운그레이드
    if (out.type === 'formula' && out.text) out.type = 'prose';
    return out;
  }

  function expandBlock(b) {
    // point 블록이 items[] 배열을 가지면 각각 point 블록으로 펼침
    if (b.type === 'point' && Array.isArray(b.items)) {
      return b.items.map(function(item) { return { type: 'point', text: item }; });
    }
    // numlist도 items[]를 가질 수 있음 — 그대로 유지
    return [adaptBlock(b)];
  }

  VOL2_DATA.chapters.forEach(function(ch) {
    if (!ch.sections) return;
    var newSections = [];
    ch.sections.forEach(function(sec, i) {
      if (sec.blocks) { newSections.push(sec); return; }
      if (sec.type) {
        var blocks = expandBlock(sec);
        newSections.push({ id: 'sec-' + i, blocks: blocks });
      } else {
        newSections.push(sec);
      }
    });
    ch.sections = newSections;
  });

  window.VOL1_DATA = VOL2_DATA;
})();
</script>
