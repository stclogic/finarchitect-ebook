<script>
function readerSetLang(lang) {
  localStorage.setItem('site-lang', lang);
  var params = new URLSearchParams(location.search);
  params.set('lang', lang);
  location.href = location.pathname + '?' + params.toString();
}
document.addEventListener('DOMContentLoaded', function() {
  var urlLang = new URLSearchParams(location.search).get('lang');
  var cur = urlLang || localStorage.getItem('site-lang') || 'ko';
  document.querySelectorAll('#reader-lang-sw .ls-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.lang === cur);
  });
});
</script>
<script>

  var lang = urlLang || localStorage.getItem('site-lang') || 'ko';
  if (urlLang) localStorage.setItem('site-lang', urlLang);
  var src = lang === 'en' ? 'data/global_en.js' : lang === 'ja' ? 'data/global_ja.js' : 'data/global.js';
  document.write('<script src="' + src + '?v=20260706"><\/script>');
})();
</script>
<script>
// vol2.js flat-section → viewer.js section→blocks 구조 변환 + 필드명 정규화
(function() {
  function adaptBlock(b) {
    var out = Object.assign({}, b);
    if (out.body !== undefined) {
      if (out.type === 'deep' || out.type === 'case') out.content = out.body;
      else if (out.type === 'prose' || out.type === 'formula' || out.type === 'story') out.text = out.body;
      delete out.body;
    }
    if (out.type === 'case' && !out.label) out.label = '사례';
    if (out.type === 'summary' && !out.title) out.title = '핵심 요약';
    if (out.type === 'formula' && out.text) out.type = 'prose';
    return out;
  }

  function expandBlock(b) {
    if (b.type === 'point' && Array.isArray(b.items)) {
      return b.items.map(function(item) { return { type: 'point', text: item }; });
    }
    return [adaptBlock(b)];
  }

  VOL2_DATA.chapters.forEach(function(ch) {
    if (!ch.sections) return;
    var newSections = [];
    ch.sections.forEach(function(sec, i) {
      if (sec.blocks) { newSections.push(sec); return; }
      if (sec.type) {
        var blocks = expandBlock(sec);
        newSections.push({ id: 'sec-' + i, blocks: blocks });
      } else {
        newSections.push(sec);
      }
    });
    ch.sections = newSections;
  });

  window.VOL1_DATA = VOL2_DATA;
})();
</script>
