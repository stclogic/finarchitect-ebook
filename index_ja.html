<script>
  (async function () {
    try {
      const ch = new URLSearchParams(location.search).get('ch');
      const FREE_CHS = ['1','2','3'];
      if (ch && FREE_CHS.includes(ch)) { window.IS_FREE_ACCESS = true; return; }
      const user = JSON.parse(localStorage.getItem('site-user') || 'null');
      if (!user) { window.IS_FREE_ACCESS = true; return; }
      if (user.email === 'stclogic@gmail.com') { return; }
      const cfg = await fetch('/.netlify/functions/get-config').then(r => r.json());
      const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
      const sb = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
      const { data } = await sb.from('book_purchases').select('id')
        .eq('user_id', user.id).eq('book_id', 'money-arch').maybeSingle();
      if (!data) window.IS_FREE_ACCESS = true;
    } catch (e) { console.error('접근 제어 오류:', e); window.IS_FREE_ACCESS = true; }
  })();
  </script>
