<!DOCTYPE html>
<!-- 결제 완료 후 리다이렉트 랜딩 — Stripe / 토스페이먼츠 공통 처리 -->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 완료 — Book Coupling</title>
  <link rel="icon" type="image/jpeg" href="https://blogger.googleusercontent.com/img/a/AVvXsEiAG9mjc7D01ZuSOVpPIy7bQoHB7IjWDadH_zBaWymx3cKXVsqdFJlNP0URua9EgCDQSUS-4OeaLPJgHpcsmm90srnmDCZ0nUuoN9Xw-_0iL_NxZQOsRp83DEPuJiVOlKP5QTci3BBtUEc_37Sq-m0CAWhd9du_pSW91HmUP90sygR8y46CuhAhOQmj3mfR">
  <link rel="stylesheet" href="assets/css/site.css">
  <style>
    .success-wrap {
      min-height: 70vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; }
    .success-title { font-size: 1.5rem; font-weight: 800; color: var(--text); margin-bottom: 0.5rem; }
    .success-sub { font-size: 0.95rem; color: var(--text2); margin-bottom: 2rem; }
    .success-btn {
      display: inline-block; padding: 12px 32px;
      background: var(--gold); color: #fff;
      border-radius: 10px; font-weight: 700;
      text-decoration: none; font-size: 1rem;
    }
    .success-error { color: #EF4444; font-size: 0.9rem; margin-top: 1rem; }
  </style>
</head>
<body>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/nav.js?v=3"></script>
<script src="assets/js/auth.js"></script>

<div class="success-wrap">
  <div class="success-icon" id="statusIcon">⏳</div>
  <div class="success-title" id="statusTitle">결제 확인 중...</div>
  <div class="success-sub" id="statusSub">잠시만 기다려 주세요.</div>
  <a href="library.html" class="success-btn" id="statusBtn" style="display:none">라이브러리로 이동</a>
  <div class="success-error" id="statusError"></div>
</div>

<script>
(async function () {
  const params = new URLSearchParams(location.search);
  const method = params.get('method');
  const readUrl = params.get('readUrl') || 'library.html';

  function setStatus(icon, title, sub, showBtn, err) {
    document.getElementById('statusIcon').textContent = icon;
    document.getElementById('statusTitle').textContent = title;
    document.getElementById('statusSub').textContent = sub || '';
    if (showBtn) document.getElementById('statusBtn').style.display = 'inline-block';
    if (err) document.getElementById('statusError').textContent = err;
  }

  try {
    if (method === 'stripe') {
      const sessionId = params.get('session_id');
      const res = await fetch('/.netlify/functions/confirm-stripe-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
      const result = await res.json();
      if (result.success) {
        setStatus('✅', '결제가 완료되었습니다!', '열람 페이지로 이동합니다...');
        setTimeout(() => { location.href = readUrl; }, 1800);
      } else {
        setStatus('❌', '결제 확인 실패', '고객센터에 문의해 주세요.', true, result.error);
      }

    } else if (method === 'toss') {
      const paymentKey = params.get('paymentKey');
      const orderId = params.get('orderId');
      const amount = params.get('amount');
      const res = await fetch('/.netlify/functions/confirm-toss-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentKey, orderId, amount: Number(amount) }),
      });
      const result = await res.json();
      if (result.success) {
        setStatus('✅', '결제가 완료되었습니다!', '열람 페이지로 이동합니다...');
        setTimeout(() => { location.href = readUrl; }, 1800);
      } else {
        setStatus('❌', '결제 확인 실패', '고객센터에 문의해 주세요.', true, result.error);
      }

    } else {
      setStatus('❓', '알 수 없는 결제 방식', '', true);
    }
  } catch (err) {
    setStatus('❌', '오류가 발생했습니다', '', true, err.message);
  }
})();
</script>
</body>
</html>
